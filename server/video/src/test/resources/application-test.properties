# Test profile configuration (activated via @ActiveProfiles("test"))
server.port=0

logging.level.org.springframework.data.convert.CustomConversions=ERROR

# Test database (separate from dev)
spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=video-2022-test
spring.data.mongodb.auto-index-creation=true

internal-base-url=http://localhost:5022
external-base-url=http://localhost:5022

short-url-service=http://localhost:5027/add
youtube-service-url=http://localhost:9999/mock-youtube

# OSS config (will be mocked, but need valid config to start)
aliyun.oss.video.bucket=video-2022-test
aliyun.oss.video.endpoint=oss-cn-beijing.aliyuncs.com
aliyun.oss.video.internal-endpoint=oss-cn-beijing-internal.aliyuncs.com
aliyun.oss.video.accessKeyId=test-access-key
aliyun.oss.video.secretKey=test-secret-key
aliyun.oss.video.accessBaseUrl=https://video-2022-test.oss-cn-beijing.aliyuncs.com/

aliyun.oss.data.bucket=oss-data-bucket-test
aliyun.oss.data.endpoint=oss-cn-beijing.aliyuncs.com
aliyun.oss.data.internal-endpoint=oss-cn-beijing-internal.aliyuncs.com
aliyun.oss.data.accessKeyId=test-access-key
aliyun.oss.data.secretKey=test-secret-key
aliyun.oss.data.inventory-prefix=video-2022-test/inventory
aliyun.oss.data.accesslog-prefix=video-2022-test/accesslog

aliyun.mps.accessKeyId=test-mps-key
aliyun.mps.secretKey=test-mps-secret

aliyun.apigateway.ip.appcode=test-appcode

aliyun.cf.video-2022.get-oss-object-md5.url=http://localhost:9999/mock-md5

callback.secret=test-callback-secret
file.access.signature-secret=test-file-access-secret

