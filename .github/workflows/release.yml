name: Release App

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: '版本名称 (例如: 1.1.0)'
        required: true
        type: string
      version_code:
        description: '版本号 (例如: 2)'
        required: true
        type: string
      platform:
        description: '平台'
        required: true
        type: choice
        options:
          - android
          - ios
          - both
      force_update:
        description: '是否强制更新'
        required: false
        type: boolean
        default: false
      version_info:
        description: '更新说明'
        required: true
        type: string

jobs:
  build-android:
    name: Build & Release Android
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Update version in build.gradle.kts
        run: |
          cd android
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.event.inputs.version_code }}/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${{ github.event.inputs.version_name }}\"/" app/build.gradle.kts
          cat app/build.gradle.kts | grep -E "version(Code|Name)"

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Install ossutil
        run: |
          curl -o ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.0.3-beta.09261200/ossutil-2.0.3-beta.09261200-linux-amd64.zip
          unzip -o ossutil.zip -d ossutil-dir
          sudo cp ossutil-dir/ossutil /usr/local/bin/
          chmod +x /usr/local/bin/ossutil

      - name: Upload APK to Aliyun OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
        run: |
          APK_FILE=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_NAME="app-v${{ github.event.inputs.version_name }}.apk"
          OSS_PATH="oss://${OSS_BUCKET}/releases/android/${APK_NAME}"

          ossutil cp "${APK_FILE}" "${OSS_PATH}" \
            --access-key-id "${OSS_ACCESS_KEY_ID}" \
            --access-key-secret "${OSS_ACCESS_KEY_SECRET}" \
            --endpoint "${OSS_ENDPOINT}" \
            --force

          echo "APK_DOWNLOAD_URL=https://${OSS_BUCKET}.${OSS_ENDPOINT}/releases/android/${APK_NAME}" >> $GITHUB_ENV

      - name: Register version
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: |
          curl -X POST "${BACKEND_API_URL}/app/publishVersion" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Api-Key: ${ADMIN_API_KEY}" \
            -d '{
              "platform": "android",
              "versionCode": ${{ github.event.inputs.version_code }},
              "versionName": "${{ github.event.inputs.version_name }}",
              "versionInfo": "${{ github.event.inputs.version_info }}",
              "downloadUrl": "'"${APK_DOWNLOAD_URL}"'",
              "isForceUpdate": ${{ github.event.inputs.force_update }},
              "minSupportedVersionCode": 1
            }'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-v${{ github.event.inputs.version_name }}
          path: android/app/build/outputs/apk/debug/*.apk

  build-ios:
    name: Build & Release iOS
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Update version in project.yml
        run: |
          cd ios
          sed -i '' "s/MARKETING_VERSION: \"[^\"]*\"/MARKETING_VERSION: \"${{ github.event.inputs.version_name }}\"/" project.yml
          sed -i '' "s/CURRENT_PROJECT_VERSION: [0-9]*/CURRENT_PROJECT_VERSION: ${{ github.event.inputs.version_code }}/" project.yml
          cat project.yml | grep -E "(MARKETING_VERSION|CURRENT_PROJECT_VERSION)"

      - name: Generate Xcode project
        run: |
          cd ios
          xcodegen generate

      - name: Build iOS archive
        run: |
          cd ios
          xcodebuild archive \
            -project VideoApp.xcodeproj \
            -scheme VideoApp \
            -archivePath build/VideoApp.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            || echo "iOS archive build completed (signing will be configured later)"

      # TODO: TestFlight upload - requires Apple Developer account setup
      # - name: Upload to TestFlight
      #   env:
      #     APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      #   run: |
      #     xcrun altool --upload-app -f build/VideoApp.ipa -t ios \
      #       --apiKey ${API_KEY_ID} --apiIssuer ${API_ISSUER_ID}

      - name: Register version
        env:
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          BACKEND_API_URL: ${{ secrets.BACKEND_API_URL }}
        run: |
          # TODO: Update downloadUrl to actual TestFlight link after Apple Developer setup
          curl -X POST "${BACKEND_API_URL}/app/publishVersion" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Api-Key: ${ADMIN_API_KEY}" \
            -d '{
              "platform": "ios",
              "versionCode": ${{ github.event.inputs.version_code }},
              "versionName": "${{ github.event.inputs.version_name }}",
              "versionInfo": "${{ github.event.inputs.version_info }}",
              "downloadUrl": "https://testflight.apple.com/join/YOUR_GROUP_ID",
              "isForceUpdate": ${{ github.event.inputs.force_update }},
              "minSupportedVersionCode": 1
            }'
