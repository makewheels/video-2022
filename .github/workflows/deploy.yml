name: 部署

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 后端测试
        working-directory: server
        run: mvn test -pl video -Pspringboot --batch-mode --no-transfer-progress

  deploy:
    name: 部署到服务器
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: 同步源码到服务器
        run: |
          tar czf /tmp/source.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='target' \
            --exclude='build' \
            --exclude='*.jar' \
            .

          scp -i ~/.ssh/deploy_key /tmp/source.tar.gz \
            root@${{ secrets.DEPLOY_SERVER_IP }}:/tmp/video-2022-source.tar.gz

          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_SERVER_IP }} << 'EOF'
          rm -rf /opt/video-2022/repo/*
          cd /opt/video-2022/repo
          tar xzf /tmp/video-2022-source.tar.gz
          rm /tmp/video-2022-source.tar.gz
          echo "源码同步完成"
          EOF

      - name: 远程构建并部署
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            root@${{ secrets.DEPLOY_SERVER_IP }} '/opt/video-2022/repo/scripts/deploy.sh'

      - name: 部署完成通知
        if: always()
        run: |
          echo "## 部署结果" >> $GITHUB_STEP_SUMMARY
          echo "- **提交**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **时间**: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- **触发者**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
