name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend-tests:
    name: 后端测试
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: >-
          mvn test -pl video -Pspringboot
          --batch-mode --no-transfer-progress

  frontend-tests:
    name: 前端测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run

  api-e2e-tests:
    name: API E2E 测试
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend
        working-directory: backend
        run: >-
          mvn clean package -pl video -Pspringboot
          -Dmaven.test.skip=true
          --batch-mode --no-transfer-progress

      - name: Start backend
        working-directory: backend
        env:
          ALIYUN_OSS_VIDEO_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_VIDEO_ACCESS_KEY_ID }}
          ALIYUN_OSS_VIDEO_SECRET_KEY: ${{ secrets.ALIYUN_OSS_VIDEO_SECRET_KEY }}
          ALIYUN_OSS_DATA_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_DATA_ACCESS_KEY_ID }}
          ALIYUN_OSS_DATA_SECRET_KEY: ${{ secrets.ALIYUN_OSS_DATA_SECRET_KEY }}
          ALIYUN_MPS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_MPS_ACCESS_KEY_ID }}
          ALIYUN_MPS_SECRET_KEY: ${{ secrets.ALIYUN_MPS_SECRET_KEY }}
          ALIYUN_APIGATEWAY_IP_APPCODE: ${{ secrets.ALIYUN_APIGATEWAY_IP_APPCODE }}
        run: |
          java -jar video/target/video-0.0.1-SNAPSHOT.jar &
          for i in $(seq 1 60); do
            curl -sf http://localhost:5022/healthCheck && break || sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        working-directory: test
        run: pip install -r requirements.txt

      - name: Run API E2E tests
        working-directory: test
        run: pytest api/ -v --tb=short

  browser-e2e-tests:
    name: 浏览器 E2E 测试
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build backend
        working-directory: backend
        run: >-
          mvn clean package -pl video -Pspringboot
          -Dmaven.test.skip=true
          --batch-mode --no-transfer-progress

      - name: Start backend
        working-directory: backend
        env:
          ALIYUN_OSS_VIDEO_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_VIDEO_ACCESS_KEY_ID }}
          ALIYUN_OSS_VIDEO_SECRET_KEY: ${{ secrets.ALIYUN_OSS_VIDEO_SECRET_KEY }}
          ALIYUN_OSS_DATA_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_DATA_ACCESS_KEY_ID }}
          ALIYUN_OSS_DATA_SECRET_KEY: ${{ secrets.ALIYUN_OSS_DATA_SECRET_KEY }}
          ALIYUN_MPS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_MPS_ACCESS_KEY_ID }}
          ALIYUN_MPS_SECRET_KEY: ${{ secrets.ALIYUN_MPS_SECRET_KEY }}
          ALIYUN_APIGATEWAY_IP_APPCODE: ${{ secrets.ALIYUN_APIGATEWAY_IP_APPCODE }}
        run: |
          java -jar video/target/video-0.0.1-SNAPSHOT.jar &
          for i in $(seq 1 60); do
            curl -sf http://localhost:5022/healthCheck && break || sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test dependencies
        working-directory: test
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        working-directory: test
        run: python -m playwright install chromium --with-deps

      - name: Run browser E2E tests
        working-directory: test
        run: pytest browser/ -v --tb=short

  cli-tests:
    name: CLI 工具测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CLI and test dependencies
        working-directory: cli
        run: pip install -e ".[test]"

      - name: Run CLI tests
        working-directory: cli
        run: python -m pytest tests/ -v --tb=short

  android-tests:
    name: Android 单元测试
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run Android unit tests
        working-directory: android
        run: ./gradlew testDebugUnitTest --no-daemon

  ios-tests:
    name: iOS 单元测试
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          ls /Applications/Xcode*.app/Contents/Developer 2>/dev/null | head -5
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 16 found, using default"
          else
            echo "Using $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Run iOS unit tests
        working-directory: ios
        run: |
          DEST=$(xcrun simctl list devices available -j | python3 -c "
          import sys,json
          data=json.load(sys.stdin)
          for runtime,devs in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devs:
                      if d.get('isAvailable') and 'iPhone' in d['name']:
                          print(f\"platform=iOS Simulator,id={d['udid']}\")
                          sys.exit(0)
          " || echo "platform=iOS Simulator,name=iPhone 15,OS=latest")
          echo "Using destination: $DEST"
          xcodebuild test \
            -project VideoApp.xcodeproj \
            -scheme VideoApp \
            -destination "$DEST" \
            -only-testing:VideoAppTests \
            -quiet

  build-and-test:
    name: build-and-test
    needs: [backend-tests, frontend-tests, api-e2e-tests, browser-e2e-tests, cli-tests, android-tests, ios-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.frontend-tests.result }}" != "success" ] || \
             [ "${{ needs.api-e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.browser-e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.cli-tests.result }}" != "success" ] || \
             [ "${{ needs.android-tests.result }}" != "success" ] || \
             [ "${{ needs.ios-tests.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
