<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计</title>
    <link rel="stylesheet" href="/css/global.css">
    <script src="https://cdn.staticfile.org/echarts/4.8.0/echarts.min.js"></script>
    <script src="https://cdn.staticfile.org/axios/0.19.2/axios.min.js"></script>
</head>
<body>
    <header class="page-header">
        <a href="/" class="logo">📹 Video</a>
        <nav class="nav-menu" id="navMenu">
            <a href="/" class="nav-link">首页</a>
            <a href="/upload.html" class="nav-link">上传</a>
            <a href="/statistics.html" class="nav-link active">统计</a>
            <a href="/transfer-youtube.html" class="nav-link">YouTube</a>
        </nav>
        <div class="header-right">
            <button id="theme-toggle" class="btn-icon" type="button" title="切换主题">🌙</button>
            <div class="header-auth" id="headerAuth"></div>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="菜单">☰</button>
    </header>

    <div class="page-container" style="padding-top:24px;">
        <div class="card">
            <div class="card-header">数据统计</div>

            <div class="dashboard-controls">
                <button id="query7Days" type="button" class="btn btn-primary">最近7天</button>
                <button id="query30Days" type="button" class="btn btn-secondary">最近30天</button>
                <input type="date" id="startTime" class="form-input" style="width:auto;" placeholder="开始时间">
                <input type="date" id="endTime" class="form-input" style="width:auto;" placeholder="结束时间">
            </div>

            <div id="bar-chart" class="chart-container"></div>
        </div>
    </div>

    <footer class="page-footer">
        <span>Video Platform</span>
    </footer>

    <script src="/js/global.js"></script>
    <script>
        var query7Days = document.getElementById('query7Days');
        query7Days.addEventListener('click', function () {
            loadData(getNDaysAgoAtMidnight(7), new Date());
        });
        var query30Days = document.getElementById('query30Days');
        query30Days.addEventListener('click', function () {
            loadData(getNDaysAgoAtMidnight(30), new Date());
        });

        var barChart = echarts.init(document.getElementById('bar-chart'));

        // Resize chart on window resize
        window.addEventListener('resize', function() {
            barChart.resize();
        });

        function getNDaysAgoAtMidnight(n) {
            const today = new Date();
            const nDaysAgo = new Date(today.getTime() - (n * 24 * 60 * 60 * 1000));
            nDaysAgo.setHours(0, 0, 0, 0);
            return nDaysAgo;
        }

        function loadData(startTime, endTime) {
            axios.get('/statistics/aggregateTrafficData?startTime='
                + startTime.getTime() + '&endTime=' + endTime.getTime())
                .then(function (response) {
                    if (!response.data || !response.data.data) {
                        VideoApp.toast('加载数据失败', 'error');
                        return;
                    }
                    barChart.setOption(response.data.data);
                })
                .catch(function (err) {
                    VideoApp.toast('加载数据失败', 'error');
                })
        }

        loadData(getNDaysAgoAtMidnight(7), new Date());
    </script>
</body>
</html>
