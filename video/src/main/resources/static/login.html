<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <link rel="stylesheet" href="/css/global.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@0.26.1/dist/axios.min.js"></script>
</head>
<body>
    <header class="page-header">
        <a href="/" class="logo">📹 Video</a>
        <nav class="nav-menu" id="navMenu">
            <a href="/" class="nav-link">我的视频</a>
            <a href="/upload.html" class="nav-link">上传</a>
            <a href="/statistics.html" class="nav-link">统计</a>
            <a href="/transfer-youtube.html" class="nav-link">YouTube</a>
        </nav>
        <div class="header-right">
            <button id="theme-toggle" class="btn-icon" type="button" title="切换主题">🌙</button>
            <div class="header-auth" id="headerAuth"></div>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="菜单">☰</button>
    </header>

    <div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height));padding:16px;">
        <div class="card" style="width:100%;max-width:400px;">
            <div class="card-header">登录</div>

            <div class="form-group">
                <label for="input_phone">手机号</label>
                <div style="display:flex;gap:8px;">
                    <input id="input_phone" type="tel" class="form-input" placeholder="请输入手机号" style="flex:1;">
                    <button id="btn_requestVerificationCode" type="button" class="btn btn-secondary">获取验证码</button>
                </div>
            </div>

            <div class="form-group">
                <label for="input_verificationCode">验证码</label>
                <input id="input_verificationCode" type="text" class="form-input" placeholder="请输入验证码">
            </div>

            <button id="btn_submitVerificationCode" type="button" class="btn btn-primary" disabled style="width:100%;">登录</button>

            <div id="errorMessage" class="login-error"></div>
        </div>
    </div>

    <footer class="page-footer">
        <span>Video Platform</span>
    </footer>

    <script src="/js/global.js"></script>
    <script>
        let btn_requestVerificationCode = document.getElementById("btn_requestVerificationCode");
        let btn_submitVerificationCode = document.getElementById("btn_submitVerificationCode");
        let input_phone = document.getElementById("input_phone");
        let input_verificationCode = document.getElementById("input_verificationCode");

        let countdownTimer = null;
        let countdownSeconds = 0;

        function isValidPhone(phone) {
            return /^1\d{10}$/.test(phone);
        }

        function startCountdown() {
            countdownSeconds = 60;
            btn_requestVerificationCode.setAttribute("disabled", "disabled");
            btn_requestVerificationCode.textContent = countdownSeconds + '秒后重试';
            countdownTimer = setInterval(function () {
                countdownSeconds--;
                if (countdownSeconds <= 0) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    btn_requestVerificationCode.removeAttribute("disabled");
                    btn_requestVerificationCode.textContent = '获取验证码';
                } else {
                    btn_requestVerificationCode.textContent = countdownSeconds + '秒后重试';
                }
            }, 1000);
        }

        btn_requestVerificationCode.addEventListener("click", function () {
            if (!isValidPhone(input_phone.value)) {
                VideoApp.toast('请输入正确的手机号（11位，以1开头）', 'error');
                return;
            }
            btn_requestVerificationCode.setAttribute("disabled", "disabled");
            axios.get('/user/requestVerificationCode?phone=' + input_phone.value)
                .then(function (res) {
                    btn_submitVerificationCode.removeAttribute("disabled");
                    VideoApp.toast('验证码已发送', 'success');
                    startCountdown();
                })
                .catch(function (err) {
                    btn_requestVerificationCode.removeAttribute("disabled");
                    VideoApp.toast('发送验证码失败', 'error');
                });
        });

        btn_submitVerificationCode.addEventListener("click", function () {
            axios.get('/user/submitVerificationCode?phone='
                + input_phone.value + "&code=" + input_verificationCode.value)
                .then(function (res) {
                    if (res.data.code !== 0) {
                        document.getElementById("errorMessage").innerText = res.data.message;
                        VideoApp.toast(res.data.message || '登录失败', 'error');
                        return;
                    }
                    let data = res.data.data;
                    VideoApp.toast('登录成功', 'success');
                    setTimeout(function () {
                        window.location.href = "//" + document.domain + ":" + location.port + "/save-token.html?token="
                            + data.token + "&target=" + VideoApp.getUrlVariable("target");
                    }, 500);
                })
                .catch(function (err) {
                    VideoApp.toast('登录失败，请重试', 'error');
                });
        });
    </script>
</body>
</html>
