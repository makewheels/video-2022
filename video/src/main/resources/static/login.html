<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <link rel="stylesheet" href="/css/global.css">
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body>
    <header class="page-header">
        <a href="/" class="logo">Video</a>
        <button id="theme-toggle" type="button">🌙</button>
    </header>

    <div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height));padding:16px;">
        <div class="card" style="width:100%;max-width:400px;">
            <div class="card-header">登录</div>

            <div class="form-group">
                <label for="input_phone">手机号</label>
                <div style="display:flex;gap:8px;">
                    <input id="input_phone" type="tel" class="form-input" placeholder="请输入手机号" style="flex:1;">
                    <button id="btn_requestVerificationCode" type="button" class="btn btn-secondary">获取验证码</button>
                </div>
            </div>

            <div class="form-group">
                <label for="input_verificationCode">验证码</label>
                <input id="input_verificationCode" type="text" class="form-input" placeholder="请输入验证码">
            </div>

            <button id="btn_submitVerificationCode" type="button" class="btn btn-primary" disabled style="width:100%;">登录</button>

            <div id="errorMessage" class="error-text"></div>
        </div>
    </div>

    <script src="/js/global.js"></script>
    <script>
        let btn_requestVerificationCode = document.getElementById("btn_requestVerificationCode");
        let btn_submitVerificationCode = document.getElementById("btn_submitVerificationCode");
        let input_phone = document.getElementById("input_phone");
        let input_verificationCode = document.getElementById("input_verificationCode");

        btn_requestVerificationCode.addEventListener("click", function () {
            btn_requestVerificationCode.setAttribute("disabled", "disabled");
            axios.get('/user/requestVerificationCode?phone=' + input_phone.value)
                .then(function (res) {
                    btn_submitVerificationCode.removeAttribute("disabled")
                });
        });

        btn_submitVerificationCode.addEventListener("click", function () {
            axios.get('/user/submitVerificationCode?phone='
                + input_phone.value + "&code=" + input_verificationCode.value)
                .then(function (res) {
                    if (res.data.code !== 0) {
                        document.getElementById("errorMessage").innerText = res.data.message;
                        return;
                    }
                    let data = res.data.data;
                    window.location.href = "//" + document.domain + ":" + location.port + "/save-token.html?token="
                        + data.token + "&target=" + VideoApp.getUrlVariable("target");
                });
        });
    </script>
</body>
</html>
