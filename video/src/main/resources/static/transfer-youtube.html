<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搬运YouTube</title>
    <link rel="stylesheet" href="/css/global.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@0.26.1/dist/axios.min.js"></script>
</head>
<body>
    <header class="page-header">
        <a href="/" class="logo">📹 Video</a>
        <nav class="nav-menu" id="navMenu">
            <a href="/" class="nav-link">首页</a>
            <a href="/upload.html" class="nav-link">上传</a>
            <a href="/statistics.html" class="nav-link">统计</a>
            <a href="/transfer-youtube.html" class="nav-link active">YouTube</a>
        </nav>
        <div class="header-right">
            <button id="theme-toggle" class="btn-icon" type="button" title="切换主题">🌙</button>
            <div class="header-auth" id="headerAuth"></div>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="菜单">☰</button>
    </header>

    <div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height));padding:16px;">
        <div class="card" style="width:100%;max-width:500px;">
            <div class="card-header">搬运YouTube视频</div>

            <div class="form-group">
                <label for="input_youtubeUrl">YouTube URL</label>
                <input id="input_youtubeUrl" type="text" class="form-input" maxlength="100" placeholder="https://www.youtube.com/watch?v=...">
            </div>

            <button id="btn_submit" type="button" class="btn btn-primary" style="width:100%;">提交</button>

            <div id="resultArea" style="margin-top:16px;">
                <div id="shortUrl" style="font-size:0.875rem;color:var(--text-secondary);word-break:break-all;"></div>
                <div id="watchUrl" style="font-size:0.875rem;color:var(--accent);word-break:break-all;margin-top:4px;"></div>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <span>Video Platform</span>
    </footer>

    <script src="/js/global.js"></script>
    <script>
        VideoApp.requireAuth();

        let input_youtubeUrl = document.getElementById("input_youtubeUrl");
        let btn_submit = document.getElementById("btn_submit");
        let shortUrl = document.getElementById("shortUrl");
        let watchUrl = document.getElementById("watchUrl");

        btn_submit.addEventListener("click", function () {
            var url = input_youtubeUrl.value.trim();
            if (!url || (url.indexOf('youtube.com') === -1 && url.indexOf('youtu.be') === -1)) {
                VideoApp.toast('请输入有效的YouTube链接', 'error');
                return;
            }
            axios.post("/video/create", {
                "videoType": "YOUTUBE",
                "youtubeUrl": url
            }, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                let data = res.data.data;
                shortUrl.innerText = data.shortUrl;
                watchUrl.innerText = data.watchUrl;
                VideoApp.toast('提交成功', 'success');
            }).catch(function (err) {
                VideoApp.toast('提交失败', 'error');
            });
        });
    </script>
</body>
</html>
