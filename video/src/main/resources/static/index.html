<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的视频 - Video</title>
    <link rel="stylesheet" href="/css/global.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@0.26.1/dist/axios.min.js"></script>
</head>
<body>
    <header class="page-header">
        <a href="/" class="logo">📹 Video</a>
        <nav class="nav-menu" id="navMenu">
            <a href="/" class="nav-link active">我的视频</a>
            <a href="/upload.html" class="nav-link">上传</a>
            <a href="/statistics.html" class="nav-link">统计</a>
            <a href="/transfer-youtube.html" class="nav-link">YouTube</a>
        </nav>
        <div class="header-right">
            <button id="theme-toggle" class="btn-icon" type="button" title="切换主题">🌙</button>
            <div class="header-auth" id="headerAuth"></div>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="菜单">☰</button>
    </header>

    <div class="page-container">
        <div id="myVideosSection">
            <div class="section-header">
                <h2 class="section-title">我的视频</h2>
                <span class="video-count" id="videoCount"></span>
            </div>

            <!-- 搜索框 -->
            <div style="margin-bottom: 16px; display: flex; gap: 8px;">
                <input type="text" id="searchInput" class="form-input"
                       placeholder="搜索视频标题或描述..." style="flex: 1; max-width: 400px;">
                <button id="searchBtn" class="btn btn-secondary" style="white-space: nowrap;">搜索</button>
                <button id="clearSearchBtn" class="btn btn-secondary" style="white-space: nowrap; display: none;">清除</button>
            </div>

            <!-- 电脑端表格 -->
            <div class="video-table-wrap" id="videoTableWrap" style="display:none;">
                <table class="video-table">
                    <thead>
                        <tr>
                            <th>标题</th>
                            <th>播放次数</th>
                            <th>时长</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="videoTableBody"></tbody>
                </table>
            </div>

            <!-- 手机端卡片列表 -->
            <div id="videoCardList" class="video-card-list" style="display:none;"></div>

            <div id="videoEmpty" class="empty-state" style="display:none;">暂无视频，快去上传吧</div>
            <div id="pagination" class="pagination" style="display:none;"></div>
            <div id="loadMoreWrap" class="load-more-wrap" style="display:none;">
                <button id="loadMoreBtn" class="btn btn-secondary">加载更多</button>
            </div>
            <div id="noMoreText" class="no-more-text" style="display:none;">没有更多了</div>
        </div>
    </div>

    <footer class="page-footer">
        <span>Video Platform</span>
    </footer>

    <script src="/js/global.js"></script>
    <script>
        var PAGE_SIZE = 12;
        var currentPage = 1;
        var totalVideos = 0;
        var allLoadedVideos = [];
        var isMobile = window.innerWidth <= 768;
        var currentKeyword = '';

        if (VideoApp.getToken()) {
            loadMyVideos(0);
        } else {
            document.getElementById('videoEmpty').style.display = 'block';
            document.getElementById('videoEmpty').textContent = '登录后查看你的视频';
        }

        window.addEventListener('resize', function () {
            var wasMobile = isMobile;
            isMobile = window.innerWidth <= 768;
            if (wasMobile !== isMobile && totalVideos > 0) {
                currentPage = 1;
                allLoadedVideos = [];
                clearList();
                loadMyVideos(0);
            }
        });

        function clearList() {
            document.getElementById('videoTableBody').innerHTML = '';
            document.getElementById('videoCardList').innerHTML = '';
        }

        function formatDuration(ms) {
            if (!ms || ms <= 0) return '-';
            var totalSec = Math.floor(ms / 1000);
            var min = Math.floor(totalSec / 60);
            var sec = totalSec % 60;
            return min + ':' + (sec < 10 ? '0' : '') + sec;
        }

        function formatRelativeTime(dateStr) {
            if (!dateStr) return '-';
            var date = new Date(dateStr);
            var now = new Date();
            var diff = now - date;
            var sec = Math.floor(diff / 1000);
            if (sec < 60) return '刚刚';
            var min = Math.floor(sec / 60);
            if (min < 60) return min + '分钟前';
            var hour = Math.floor(min / 60);
            if (hour < 24) return hour + '小时前';
            var day = Math.floor(hour / 24);
            if (day < 30) return day + '天前';
            var month = Math.floor(day / 30);
            if (month < 12) return month + '个月前';
            return Math.floor(month / 12) + '年前';
        }

        function visibilityIcon(v) {
            if (v === 'UNLISTED') return '🔗';
            if (v === 'PRIVATE') return '🔒';
            return '';
        }

        function renderTableRow(v) {
            var tr = document.createElement('tr');
            tr.setAttribute('data-video-id', v.id || '');
            var icon = visibilityIcon(v.visibility);
            var titleText = (icon ? icon + ' ' : '') + (v.title || '未命名视频');
            var statusBadge = (v.status && v.status !== 'READY')
                ? ' <span style="font-size:0.75rem;padding:2px 6px;border-radius:4px;background:#ffc107;color:#000;">处理中</span>'
                : '';
            tr.innerHTML =
                '<td class="td-title"><a href="/watch?v=' + (v.watchId || '') + '">' + titleText + '</a>' + statusBadge + '</td>' +
                '<td>' + (v.watchCount || 0) + '</td>' +
                '<td>' + formatDuration(v.duration) + '</td>' +
                '<td>' + formatRelativeTime(v.createTimeString || v.createTime) + '</td>' +
                '<td class="td-actions">' +
                    '<a href="/watch?v=' + (v.watchId || '') + '" class="action-link">播放</a>' +
                    '<a href="/edit.html?videoId=' + (v.id || '') + '" class="action-link">编辑</a>' +
                    '<a href="javascript:void(0)" class="action-link" style="color:#dc3545;" onclick="deleteVideo(\'' + v.id + '\', this)">删除</a>' +
                '</td>';
            return tr;
        }

        function renderMobileCard(v) {
            var card = document.createElement('a');
            card.className = 'video-list-card';
            card.href = '/watch?v=' + (v.watchId || '');
            var title = document.createElement('div');
            title.className = 'video-title';
            var icon = visibilityIcon(v.visibility);
            title.textContent = (icon ? icon + ' ' : '') + (v.title || '未命名视频');
            var meta = document.createElement('div');
            meta.className = 'video-meta';
            var parts = [(v.watchCount || 0) + ' 播放'];
            var dur = formatDuration(v.duration);
            if (dur !== '-') parts.push(dur);
            var time = formatRelativeTime(v.createTimeString || v.createTime);
            if (time !== '-') parts.push(time);
            meta.textContent = parts.join(' · ');
            card.appendChild(title);
            if (v.status && v.status !== 'READY') {
                var badge = document.createElement('span');
                badge.textContent = '处理中';
                badge.style.cssText = 'font-size:0.75rem;padding:2px 6px;border-radius:4px;background:#ffc107;color:#000;margin-left:8px;';
                title.appendChild(document.createTextNode(' '));
                title.appendChild(badge);
            }
            card.appendChild(meta);
            return card;
        }

        function loadMyVideos(skip) {
            var url = '/video/getMyVideoList?skip=' + skip + '&limit=' + PAGE_SIZE;
            if (currentKeyword) {
                url += '&keyword=' + encodeURIComponent(currentKeyword);
            }
            axios.get(url, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                var result = res.data.data;
                var list = result.list;
                totalVideos = result.total;

                document.getElementById('videoCount').textContent = '共 ' + totalVideos + ' 个';

                if (totalVideos === 0) {
                    document.getElementById('videoEmpty').style.display = 'block';
                    return;
                }

                if (isMobile) {
                    document.getElementById('videoTableWrap').style.display = 'none';
                    document.getElementById('videoCardList').style.display = 'block';
                    var cardList = document.getElementById('videoCardList');
                    for (var i = 0; i < list.length; i++) {
                        allLoadedVideos.push(list[i]);
                        cardList.appendChild(renderMobileCard(list[i]));
                    }
                    updateLoadMore();
                } else {
                    document.getElementById('videoCardList').style.display = 'none';
                    document.getElementById('videoTableWrap').style.display = 'block';
                    var tbody = document.getElementById('videoTableBody');
                    tbody.innerHTML = '';
                    for (var i = 0; i < list.length; i++) {
                        tbody.appendChild(renderTableRow(list[i]));
                    }
                    renderPagination();
                }
            }).catch(function () {
                document.getElementById('videoEmpty').style.display = 'block';
                document.getElementById('videoEmpty').textContent = '加载视频列表失败';
            });
        }

        function renderPagination() {
            var totalPages = Math.ceil(totalVideos / PAGE_SIZE);
            if (totalPages <= 1) {
                document.getElementById('pagination').style.display = 'none';
                return;
            }
            var pag = document.getElementById('pagination');
            pag.style.display = 'flex';
            pag.innerHTML = '';

            var prev = document.createElement('button');
            prev.className = 'page-btn' + (currentPage <= 1 ? ' disabled' : '');
            prev.textContent = '上一页';
            prev.disabled = currentPage <= 1;
            prev.onclick = function () { goToPage(currentPage - 1); };
            pag.appendChild(prev);

            var pages = getPageNumbers(currentPage, totalPages);
            for (var i = 0; i < pages.length; i++) {
                var p = pages[i];
                if (p === '...') {
                    var ellipsis = document.createElement('span');
                    ellipsis.className = 'page-ellipsis';
                    ellipsis.textContent = '...';
                    pag.appendChild(ellipsis);
                } else {
                    var btn = document.createElement('button');
                    btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
                    btn.textContent = p;
                    btn.onclick = (function (page) { return function () { goToPage(page); }; })(p);
                    pag.appendChild(btn);
                }
            }

            var next = document.createElement('button');
            next.className = 'page-btn' + (currentPage >= totalPages ? ' disabled' : '');
            next.textContent = '下一页';
            next.disabled = currentPage >= totalPages;
            next.onclick = function () { goToPage(currentPage + 1); };
            pag.appendChild(next);
        }

        function getPageNumbers(current, total) {
            if (total <= 7) {
                var arr = [];
                for (var i = 1; i <= total; i++) arr.push(i);
                return arr;
            }
            var pages = [1];
            if (current > 3) pages.push('...');
            var start = Math.max(2, current - 1);
            var end = Math.min(total - 1, current + 1);
            for (var i = start; i <= end; i++) pages.push(i);
            if (current < total - 2) pages.push('...');
            pages.push(total);
            return pages;
        }

        function goToPage(page) {
            var totalPages = Math.ceil(totalVideos / PAGE_SIZE);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadMyVideos((page - 1) * PAGE_SIZE);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateLoadMore() {
            var loadMoreWrap = document.getElementById('loadMoreWrap');
            var noMoreText = document.getElementById('noMoreText');
            if (allLoadedVideos.length >= totalVideos) {
                loadMoreWrap.style.display = 'none';
                if (totalVideos > PAGE_SIZE) noMoreText.style.display = 'block';
            } else {
                loadMoreWrap.style.display = 'flex';
                noMoreText.style.display = 'none';
            }
        }

        document.getElementById('loadMoreBtn').onclick = function () {
            loadMyVideos(allLoadedVideos.length);
        };

        function deleteVideo(videoId, linkEl) {
            if (!confirm('确定要删除这个视频吗？此操作不可恢复。')) return;
            linkEl.textContent = '删除中...';
            linkEl.style.pointerEvents = 'none';
            axios.get('/video/delete?videoId=' + videoId, {
                headers: VideoApp.authHeaders()
            }).then(function () {
                VideoApp.toast('视频已删除', 'success');
                // 重新加载列表
                currentPage = 1;
                allLoadedVideos = [];
                clearList();
                loadMyVideos(0);
            }).catch(function (err) {
                VideoApp.toast('删除失败: ' + (err.response ? err.response.data.message : err.message), 'error');
                linkEl.textContent = '删除';
                linkEl.style.pointerEvents = 'auto';
            });
        }

        // 搜索功能
        function doSearch() {
            var keyword = document.getElementById('searchInput').value.trim();
            currentKeyword = keyword;
            currentPage = 1;
            allLoadedVideos = [];
            document.getElementById('clearSearchBtn').style.display = keyword ? 'inline-block' : 'none';
            loadMyVideos(0);
        }

        document.getElementById('searchBtn').addEventListener('click', doSearch);
        document.getElementById('searchInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') doSearch();
        });
        document.getElementById('clearSearchBtn').addEventListener('click', function () {
            document.getElementById('searchInput').value = '';
            currentKeyword = '';
            currentPage = 1;
            allLoadedVideos = [];
            document.getElementById('clearSearchBtn').style.display = 'none';
            loadMyVideos(0);
        });
    </script>
</body>
</html>
