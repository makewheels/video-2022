<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <link rel="stylesheet" href="/css/global.css">
</head>
<body>
    <header class="page-header">
        <a href="/" class="logo">Video</a>
        <button id="theme-toggle" type="button">🌙</button>
    </header>

    <div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--header-height));padding:16px;">
        <div class="card" style="width:100%;max-width:500px;">
            <div class="card-header" id="greeting">欢迎</div>

            <div class="nav-links">
                <a href="/upload.html" class="nav-link-item">
                    <span class="nav-icon">📤</span>
                    <span class="nav-text">上传视频</span>
                </a>
                <a href="/statistics.html" class="nav-link-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">数据统计</span>
                </a>
                <a href="/transfer-youtube.html" class="nav-link-item">
                    <span class="nav-icon">🔄</span>
                    <span class="nav-text">搬运YouTube</span>
                </a>
            </div>
        </div>
    </div>

    <script src="/js/global.js"></script>
    <script>
        var greeting = document.getElementById('greeting');
        if (VideoApp.getToken()) {
            greeting.textContent = '欢迎回来';
        } else {
            greeting.textContent = '请先登录';
        }
    </script>
</body>
</html>
