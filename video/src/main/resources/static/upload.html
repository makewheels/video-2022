<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传视频</title>
    <link rel="stylesheet" href="/css/global.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@0.26.1/dist/axios.min.js"></script>
    <script src="https://gosspublic.alicdn.com/aliyun-oss-sdk-6.17.0.min.js"></script>
</head>
<body>
    <header class="page-header">
        <a href="/" class="logo">📹 Video</a>
        <nav class="nav-menu" id="navMenu">
            <a href="/" class="nav-link">我的视频</a>
            <a href="/upload.html" class="nav-link active">上传</a>
            <a href="/statistics.html" class="nav-link">统计</a>
            <a href="/transfer-youtube.html" class="nav-link">YouTube</a>
        </nav>
        <div class="header-right">
            <button id="theme-toggle" class="btn-icon" type="button" title="切换主题">🌙</button>
            <div class="header-auth" id="headerAuth"></div>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="菜单">☰</button>
    </header>

    <div class="page-container" style="padding-top:24px;padding-bottom:24px;">
        <div class="card">
            <div class="card-header">上传视频</div>

            <div class="upload-section">
                <div class="section-title">选择文件</div>
                <div class="upload-zone" id="uploadZone">
                    <div class="upload-zone-icon" id="uploadZoneIcon">📁</div>
                    <div class="upload-zone-text" id="uploadZoneText">点击选择文件或拖拽到此处</div>
                    <input type="file" id="input_file" style="display:none;" accept="video/*,audio/*">
                </div>
            </div>

            <!-- Progress section -->
            <div id="progress-bar" class="progress-bar" style="margin-top:16px;">
                <div id="progress-bar-inner" class="progress-bar-fill"></div>
            </div>
            <div id="text_progress" class="progress-text"></div>

            <div class="upload-section" style="margin-top:16px;">
                <div class="section-title">视频信息</div>
                <div class="form-group">
                    <label for="input_title">标题</label>
                    <input id="input_title" type="text" class="form-input" maxlength="100" placeholder="视频标题">
                </div>

                <div class="form-group">
                    <label for="input_description">描述</label>
                    <textarea id="input_description" class="form-input" maxlength="1000" placeholder="视频描述" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="input_visibility">可见性</label>
                    <select id="input_visibility" class="form-input">
                        <option value="PUBLIC">公开</option>
                        <option value="UNLISTED">不公开（有链接可看）</option>
                        <option value="PRIVATE">私密（仅自己可看）</option>
                    </select>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="upload-actions" style="display:flex;gap:8px;flex-wrap:wrap;">
                <button id="btn_update" type="button" class="btn btn-primary">修改信息</button>
                <button id="btn_copy" type="button" class="btn btn-secondary">一键复制</button>
            </div>

            <!-- Watch URL display -->
            <div id="watchUrl" style="margin-top:12px;font-size:0.875rem;color:var(--text-secondary);word-break:break-all;"></div>

            <!-- 转码状态 -->
            <div id="transcodeStatus" style="display:none;margin-top:12px;padding:12px;border-radius:8px;background:var(--bg-elevated);border:1px solid var(--border-light);">
                <span id="statusIcon" style="margin-right:8px;">⏳</span>
                <span id="statusText">等待处理...</span>
            </div>

            <!-- Playlist section -->
            <div class="upload-section" style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border-light);">
                <div class="section-title">播放列表</div>
                <div class="form-group">
                    <label for="select_playlist">选择列表</label>
                    <select id="select_playlist" class="form-input"></select>
                </div>
                <button id="btn_addPlaylistItem" type="button" class="btn btn-secondary">加入播放列表</button>
                <div id="span_playlistUrl" style="margin-top:8px;font-size:0.875rem;color:var(--text-secondary);word-break:break-all;"></div>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <span>Video Platform</span>
    </footer>

    <script src="/js/global.js"></script>
    <script>
        // Auth check — uses global.js
        if (!VideoApp.requireAuth()) {
            // requireAuth already redirects, stop execution
        }

        // Upload zone click handler
        document.getElementById('uploadZone').addEventListener('click', function() {
            document.getElementById('input_file').click();
        });

        // Drag and drop
        const uploadZone = document.getElementById('uploadZone');
        uploadZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', function() {
            this.classList.remove('dragover');
        });
        uploadZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                // Create a synthetic file list
                const input = document.getElementById('input_file');
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                input.files = dataTransfer.files;
                input.dispatchEvent(new Event('change'));
            }
        });
    </script>
    <script>
        // === ALL ORIGINAL JS LOGIC BELOW (with UX improvements) ===
        let input_file = document.getElementById("input_file");
        let input_title = document.getElementById("input_title");
        let input_description = document.getElementById("input_description");
        let btn_update = document.getElementById("btn_update");
        let watchUrl = document.getElementById("watchUrl");
        let text_progress = document.getElementById("text_progress");
        let progress_bar = document.getElementById("progress-bar-inner");

        let fileId;
        let videoId;
        let watchId;
        let key;

        const MAX_FILE_SIZE = 5 * 1024 * 1024 * 1024; // 5GB

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
        }

        input_file.onchange = () => {
            const selectedFile = input_file.files[0];
            if (!selectedFile) return;

            let rawFilename = selectedFile.name;
            let size = selectedFile.size;

            // UX: 显示已选文件信息
            document.getElementById('uploadZoneIcon').textContent = '📄';
            document.getElementById('uploadZoneText').innerHTML =
                '<strong>' + rawFilename + '</strong><br>' + formatFileSize(size);

            // UX: 重置进度条
            progress_bar.style.width = '0%';
            text_progress.innerText = '';

            // UX: 文件大小校验
            if (size > MAX_FILE_SIZE) {
                VideoApp.toast('文件大小超过 5GB 限制，请选择较小的文件', 'error');
                return;
            }

            input_title.value = rawFilename.substring(0, rawFilename.lastIndexOf("."));
            VideoApp.toast('已选择文件: ' + rawFilename, 'info');
            createVideo(rawFilename, size, "USER_UPLOAD");
        }

        function createVideo(rawFilename, size, videoType) {
            VideoApp.toast('正在创建视频...', 'info');
            axios.post("/video/create", {
                rawFilename: rawFilename,
                size: size,
                videoType: videoType
            }, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                let data = res.data.data;
                fileId = data.fileId;
                videoId = data.videoId;
                watchId = data.watchId;
                watchUrl.innerText = data.watchUrl;
                VideoApp.toast('视频创建成功，开始上传', 'success');
                beginUpload();
            }).catch(function (err) {
                VideoApp.toast('创建视频失败: ' + (err.response ? err.response.data.message : err.message), 'error');
            });
        }

        btn_update.addEventListener("click", function () {
            // UX: 无视频时提示
            if (videoId === undefined) {
                VideoApp.toast('请先选择并上传文件', 'error');
                return;
            }
            if (!input_title.value.trim()) {
                VideoApp.toast('标题不能为空', 'error');
                return;
            }
            axios.post("/video/updateInfo", {
                id: videoId,
                title: input_title.value,
                description: input_description.value,
                visibility: document.getElementById("input_visibility").value
            }, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                VideoApp.toast('修改成功', 'success');
            }).catch(function (err) {
                VideoApp.toast('修改失败: ' + (err.response ? err.response.data.message : err.message), 'error');
            });
        });

        btn_copy.addEventListener("click", function () {
            if (!watchUrl.innerText) {
                VideoApp.toast('暂无可复制的链接', 'error');
                return;
            }
            let content = "【" + input_title.value + "】" + "\n" + watchUrl.innerText;
            navigator.clipboard.writeText(content).then(function () {
                VideoApp.toast('已复制到剪贴板', 'success');
            }).catch(function () {
                VideoApp.toast('复制失败', 'error');
            });
        });

        function beginUpload() {
            axios.get("/file/getUploadCredentials?fileId=" + fileId, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                runUpload(res.data.data);
            }).catch(function (err) {
                VideoApp.toast('获取上传凭证失败: ' + (err.response ? err.response.data.message : err.message), 'error');
            });
        }

        async function runUpload(uploadCredentials) {
            const file = document.getElementById('input_file').files[0];
            let key = uploadCredentials.key;
            const client = new OSS({
                bucket: uploadCredentials.bucket,
                endpoint: uploadCredentials.endpoint,
                accessKeyId: uploadCredentials.accessKeyId,
                accessKeySecret: uploadCredentials.secretKey,
                stsToken: uploadCredentials.sessionToken,
                secure: true
            });

            try {
                const result = await client.multipartUpload(key, file, {
                    parallel: 2,
                    partSize: 512 * 1024,
                    progress: function (p, checkpoint) {
                        let percent = p * 100;
                        text_progress.innerText = percent.toFixed(2) + " %";
                        progress_bar.style.width = percent + "%";
                    }
                });

                if (result.res.status === 200) {
                    onUploadFinish();
                } else {
                    VideoApp.toast('上传失败，状态码: ' + result.res.status, 'error');
                }
            } catch (err) {
                VideoApp.toast('上传出错: ' + err.message, 'error');
                text_progress.innerText = '上传失败';
            }
        }

        function onUploadFinish() {
            axios.get("/file/uploadFinish?fileId=" + fileId, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                axios.get("/video/rawFileUploadFinish?videoId=" + videoId, {
                    headers: VideoApp.authHeaders()
                }).then(function (res) {
                    text_progress.innerText = "上传已完成，正在处理...";
                    VideoApp.toast('上传已完成，开始处理', 'success');
                    startStatusPolling();
                }).catch(function (err) {
                    VideoApp.toast('处理上传失败', 'error');
                });
            }).catch(function (err) {
                VideoApp.toast('完成上传失败', 'error');
            });
        }

        var statusPollTimer = null;
        var statusPollStart = 0;
        var STATUS_POLL_INTERVAL = 5000;
        var STATUS_POLL_TIMEOUT = 600000; // 10 min

        var statusLabels = {
            'CREATED': '已创建',
            'UPLOADING': '上传中',
            'PREPARE_TRANSCODING': '准备转码...',
            'TRANSCODING': '转码中...',
            'TRANSCODING_PARTLY_COMPLETE': '转码中（部分完成）...',
            'PROCESSING_AFTER_TRANSCODE_COMPLETE': '转码后处理中...',
            'READY': '✅ 处理完成'
        };

        function startStatusPolling() {
            var statusDiv = document.getElementById('transcodeStatus');
            statusDiv.style.display = 'block';
            statusPollStart = Date.now();
            pollStatus();
        }

        function pollStatus() {
            if (Date.now() - statusPollStart > STATUS_POLL_TIMEOUT) {
                document.getElementById('statusIcon').textContent = '⚠️';
                document.getElementById('statusText').textContent = '处理超时，请刷新页面查看';
                return;
            }
            axios.get('/video/getVideoStatus?videoId=' + videoId, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                var d = res.data.data;
                var label = statusLabels[d.status] || d.status;
                document.getElementById('statusText').textContent = label;
                if (d.isReady) {
                    document.getElementById('statusIcon').textContent = '✅';
                    text_progress.innerText = "处理完成";
                    VideoApp.toast('视频处理完成', 'success');
                } else {
                    statusPollTimer = setTimeout(pollStatus, STATUS_POLL_INTERVAL);
                }
            }).catch(function () {
                statusPollTimer = setTimeout(pollStatus, STATUS_POLL_INTERVAL);
            });
        }

        function loadPlayList() {
            axios.get("/playlist/getMyPlaylistByPage?skip=0&limit=100", {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                let data = res.data.data;
                let select = document.getElementById("select_playlist");
                let btn = document.getElementById("btn_addPlaylistItem");
                if (!data || data.length === 0) {
                    var emptyDiv = document.createElement("div");
                    emptyDiv.className = "empty-state";
                    emptyDiv.textContent = "暂无播放列表";
                    select.parentElement.appendChild(emptyDiv);
                    // UX: 空列表时禁用按钮
                    btn.disabled = true;
                    btn.title = '暂无播放列表';
                    return;
                }
                for (let i = 0; i < data.length; i++) {
                    let option = document.createElement("option");
                    option.value = data[i].id;
                    option.innerText = data[i].title;
                    select.appendChild(option);
                }
            }).catch(function (err) {
                VideoApp.toast('加载播放列表失败', 'error');
            });
        }

        function addPlaylistItem() {
            document.getElementById("btn_addPlaylistItem").addEventListener("click", function () {
                // UX: 加入列表前校验
                if (!videoId) {
                    VideoApp.toast('请先选择并上传文件', 'error');
                    return;
                }
                let playlistId = document.getElementById("select_playlist").value;
                if (!playlistId) {
                    VideoApp.toast('请选择播放列表', 'error');
                    return;
                }
                axios.post("/playlist/addPlaylistItem", {
                    playlistId: playlistId,
                    videoIdList: [videoId],
                    "addMode": "ADD_TO_TOP"
                }, {
                    headers: VideoApp.authHeaders()
                }).then(function (res) {
                    document.getElementById("span_playlistUrl").innerText = window.location.origin
                        + '/watch?v=' + watchId + '&list=' + playlistId;
                    VideoApp.toast('已加入播放列表', 'success');
                }).catch(function (err) {
                    VideoApp.toast('加入播放列表失败', 'error');
                });
            });
        }

        function start() {
            loadPlayList();
            addPlaylistItem();
        }

        start();
    </script>
</body>
</html>
