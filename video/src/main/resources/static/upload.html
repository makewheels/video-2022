<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传视频</title>
    <link rel="stylesheet" href="/css/global.css">
    <script src="https://production-bucket.oss-cn-beijing.aliyuncs.com/dist/axios/axios-0.26.1.min.js"></script>
    <script src="https://gosspublic.alicdn.com/aliyun-oss-sdk-6.17.0.min.js"></script>
</head>
<body>
    <header class="page-header">
        <a href="/" class="logo">Video</a>
        <button id="theme-toggle" type="button">🌙</button>
    </header>

    <div class="page-container" style="padding-top:24px;padding-bottom:24px;">
        <div class="card">
            <div class="card-header">上传视频</div>

            <!-- Upload zone - click to select file -->
            <div class="upload-zone" id="uploadZone">
                <div class="upload-zone-icon">📁</div>
                <div class="upload-zone-text">点击选择文件或拖拽到此处</div>
                <input type="file" id="input_file" style="display:none;">
            </div>

            <!-- Progress section (visible after file selected) -->
            <div id="progress-bar" class="progress-bar" style="margin-top:16px;">
                <div id="progress-bar-inner" class="progress-bar-fill"></div>
            </div>
            <div id="text_progress" class="progress-text"></div>

            <!-- Video info -->
            <div class="form-group" style="margin-top:16px;">
                <label for="input_title">标题</label>
                <input id="input_title" type="text" class="form-input" maxlength="100" placeholder="视频标题">
            </div>

            <div class="form-group">
                <label for="input_description">描述</label>
                <input id="input_description" type="text" class="form-input" maxlength="1000" placeholder="视频描述">
            </div>

            <!-- Action buttons -->
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button id="btn_update" type="button" class="btn btn-primary">修改信息</button>
                <button id="btn_copy" type="button" class="btn btn-secondary">一键复制</button>
            </div>

            <!-- Watch URL display -->
            <div id="watchUrl" style="margin-top:12px;font-size:0.875rem;color:var(--text-secondary);word-break:break-all;"></div>

            <!-- Playlist section -->
            <div style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border-light);">
                <div class="form-group">
                    <label for="select_playlist">播放列表</label>
                    <select id="select_playlist" class="form-input"></select>
                </div>
                <button id="btn_addPlaylistItem" type="button" class="btn btn-secondary">加入播放列表</button>
                <div id="span_playlistUrl" style="margin-top:8px;font-size:0.875rem;color:var(--text-secondary);word-break:break-all;"></div>
            </div>
        </div>
    </div>

    <script src="/js/global.js"></script>
    <script>
        // Auth check — uses global.js
        if (!VideoApp.requireAuth()) {
            // requireAuth already redirects, stop execution
        }

        // Upload zone click handler
        document.getElementById('uploadZone').addEventListener('click', function() {
            document.getElementById('input_file').click();
        });

        // Drag and drop
        const uploadZone = document.getElementById('uploadZone');
        uploadZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', function() {
            this.classList.remove('dragover');
        });
        uploadZone.addEventListener('drop', function(e) {
            e.preventDefault();
            this.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                // Create a synthetic file list
                const input = document.getElementById('input_file');
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                input.files = dataTransfer.files;
                input.dispatchEvent(new Event('change'));
            }
        });
    </script>
    <script>
        // === ALL ORIGINAL JS LOGIC BELOW (preserved exactly) ===
        let input_file = document.getElementById("input_file");
        let input_title = document.getElementById("input_title");
        let input_description = document.getElementById("input_description");
        let btn_update = document.getElementById("btn_update");
        let watchUrl = document.getElementById("watchUrl");
        let text_progress = document.getElementById("text_progress");
        let progress_bar = document.getElementById("progress-bar-inner");

        let fileId;
        let videoId;
        let watchId;
        let key;

        input_file.onchange = () => {
            const selectedFile = input_file.files[0];
            let rawFilename = selectedFile.name;
            let size = selectedFile.size;
            input_title.value = rawFilename.substring(0, rawFilename.lastIndexOf("."));
            createVideo(rawFilename, size, "USER_UPLOAD");
        }

        function createVideo(rawFilename, size, videoType) {
            axios.post("/video/create", {
                rawFilename: rawFilename,
                size: size,
                videoType: videoType
            }, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                let data = res.data.data;
                fileId = data.fileId;
                videoId = data.videoId;
                watchId = data.watchId;
                watchUrl.innerText = data.watchUrl;
                beginUpload();
            });
        }

        btn_update.addEventListener("click", function () {
            if (videoId === undefined) return;
            axios.post("/video/updateInfo", {
                id: videoId,
                title: input_title.value,
                description: input_description.value
            }, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {});
        });

        btn_copy.addEventListener("click", function () {
            let content = "【" + input_title.value + "】" + "\n" + watchUrl.innerText;
            navigator.clipboard.writeText(content);
        });

        function beginUpload() {
            axios.get("/file/getUploadCredentials?fileId=" + fileId, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                runUpload(res.data.data);
            });
        }

        async function runUpload(uploadCredentials) {
            const file = document.getElementById('input_file').files[0];
            let key = uploadCredentials.key;
            const client = new OSS({
                bucket: uploadCredentials.bucket,
                endpoint: uploadCredentials.endpoint,
                accessKeyId: uploadCredentials.accessKeyId,
                accessKeySecret: uploadCredentials.secretKey,
                stsToken: uploadCredentials.sessionToken,
                secure: true
            });

            const result = await client.multipartUpload(key, file, {
                parallel: 2,
                partSize: 512 * 1024,
                progress: function (p, checkpoint) {
                    let percent = p * 100;
                    text_progress.innerText = percent.toFixed(2) + " %";
                    progress_bar.style.width = percent + "%";
                }
            });

            if (result.res.status === 200) {
                onUploadFinish();
            }
        }

        function onUploadFinish() {
            axios.get("/file/uploadFinish?fileId=" + fileId, {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                axios.get("/video/rawFileUploadFinish?videoId=" + videoId, {
                    headers: VideoApp.authHeaders()
                }).then(function (res) {
                    text_progress.innerText = "上传已完成";
                });
            });
        }

        function loadPlayList() {
            axios.get("/playlist/getMyPlaylistByPage?skip=0&limit=100", {
                headers: VideoApp.authHeaders()
            }).then(function (res) {
                let data = res.data.data;
                let select = document.getElementById("select_playlist");
                for (let i = 0; i < data.length; i++) {
                    let option = document.createElement("option");
                    option.value = data[i].id;
                    option.innerText = data[i].title;
                    select.appendChild(option);
                }
            });
        }

        function addPlaylistItem() {
            document.getElementById("btn_addPlaylistItem").addEventListener("click", function () {
                let playlistId = document.getElementById("select_playlist").value;
                axios.post("/playlist/addPlaylistItem", {
                    playlistId: playlistId,
                    videoIdList: [videoId],
                    "addMode": "ADD_TO_TOP"
                }, {
                    headers: VideoApp.authHeaders()
                }).then(function (res) {
                    document.getElementById("span_playlistUrl").innerText = window.location.origin
                        + '/watch?v=' + watchId + '&list=' + playlistId;
                });
            });
        }

        function start() {
            loadPlayList();
            addPlaylistItem();
        }

        start();
    </script>
</body>
</html>
