<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑视频 - Video</title>
    <link rel="stylesheet" href="/css/global.css">
    <script src="https://cdn.jsdelivr.net/npm/axios@0.26.1/dist/axios.min.js"></script>
</head>
<body>
    <header class="page-header">
        <a href="/" class="logo">📹 Video</a>
        <nav class="nav-menu" id="navMenu">
            <a href="/" class="nav-link">我的视频</a>
            <a href="/upload.html" class="nav-link">上传</a>
            <a href="/statistics.html" class="nav-link">统计</a>
            <a href="/transfer-youtube.html" class="nav-link">YouTube</a>
        </nav>
        <div class="header-right">
            <button id="theme-toggle" class="btn-icon" type="button" title="切换主题">🌙</button>
            <div class="header-auth" id="headerAuth"></div>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="菜单">☰</button>
    </header>

    <div class="page-container">
        <div class="edit-page">
            <div class="edit-header">
                <a href="/" class="back-link">← 返回列表</a>
                <h2 class="section-title">编辑视频</h2>
            </div>

            <!-- 只读信息 -->
            <div class="edit-info-card card">
                <h3 class="card-header">视频信息</h3>
                <div class="info-grid" id="infoGrid">
                    <div class="info-item">
                        <span class="info-label">播放次数</span>
                        <span class="info-value" id="infoWatchCount">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">时长</span>
                        <span class="info-value" id="infoDuration">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">创建时间</span>
                        <span class="info-value" id="infoCreateTime">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">视频类型</span>
                        <span class="info-value" id="infoType">-</span>
                    </div>
                </div>
                <div class="info-links">
                    <div class="info-link-row">
                        <span class="info-label">播放链接</span>
                        <span class="info-value link-value" id="infoWatchUrl">-</span>
                        <button class="btn-icon copy-btn" id="copyWatchUrl" title="复制">📋</button>
                    </div>
                    <div class="info-link-row" id="shortUrlRow" style="display:none;">
                        <span class="info-label">短链接</span>
                        <span class="info-value link-value" id="infoShortUrl">-</span>
                        <button class="btn-icon copy-btn" id="copyShortUrl" title="复制">📋</button>
                    </div>
                </div>
            </div>

            <!-- 可编辑字段 -->
            <div class="edit-form-card card">
                <h3 class="card-header">编辑信息</h3>
                <div class="form-group">
                    <label class="form-label" for="input_title">标题</label>
                    <input type="text" id="input_title" class="form-input" placeholder="输入视频标题" maxlength="100">
                </div>
                <div class="form-group">
                    <label class="form-label" for="input_description">描述</label>
                    <textarea id="input_description" class="form-input form-textarea" placeholder="输入视频描述" rows="5" maxlength="1000"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label" for="input_visibility">可见性</label>
                    <select id="input_visibility" class="form-input">
                        <option value="PUBLIC">公开</option>
                        <option value="UNLISTED">不公开（有链接可看）</option>
                        <option value="PRIVATE">私密（仅自己可看）</option>
                    </select>
                </div>
                <div class="edit-actions">
                    <button id="btn_save" class="btn btn-primary" disabled>保存</button>
                    <a href="/" class="btn btn-secondary">返回列表</a>
                </div>
            </div>

            <!-- 危险操作 -->
            <div class="edit-form-card card" style="border-color: #dc3545;">
                <h3 class="card-header" style="color: #dc3545;">危险操作</h3>
                <p style="color: var(--text-secondary); margin-bottom: 16px; font-size: 14px;">
                    删除视频后将无法恢复，视频文件和所有相关数据将被永久删除。
                </p>
                <button id="btn_delete" class="btn" style="background-color: #dc3545; color: white; border: none;">删除视频</button>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <span>Video Platform</span>
    </footer>

    <script src="/js/global.js"></script>
    <script>
        var videoId = new URLSearchParams(window.location.search).get('videoId');
        if (!videoId) {
            VideoApp.toast('缺少 videoId 参数', 'error');
            setTimeout(function () { window.location.href = '/'; }, 1500);
        }

        var originalTitle = '';
        var originalDesc = '';
        var originalVisibility = 'PUBLIC';

        function formatDuration(ms) {
            if (!ms || ms <= 0) return '-';
            var totalSec = Math.floor(ms / 1000);
            var min = Math.floor(totalSec / 60);
            var sec = totalSec % 60;
            return min + ':' + (sec < 10 ? '0' : '') + sec;
        }

        var typeMap = {
            'USER_UPLOAD': '用户上传',
            'YOUTUBE': 'YouTube搬运'
        };

        function loadVideoDetail() {
            axios.get('/video/getVideoDetail?videoId=' + videoId).then(function (res) {
                var v = res.data.data;

                // 填充只读信息
                document.getElementById('infoWatchCount').textContent = (v.watchCount || 0) + ' 次';
                document.getElementById('infoDuration').textContent = formatDuration(v.duration);
                document.getElementById('infoCreateTime').textContent = v.createTimeString || '-';
                document.getElementById('infoType').textContent = typeMap[v.type] || v.type || '-';

                // 播放链接
                if (v.watchUrl) {
                    document.getElementById('infoWatchUrl').textContent = v.watchUrl;
                }
                if (v.shortUrl) {
                    document.getElementById('infoShortUrl').textContent = v.shortUrl;
                    document.getElementById('shortUrlRow').style.display = 'flex';
                }

                // 填充可编辑字段
                originalTitle = v.title || '';
                originalDesc = v.description || '';
                originalVisibility = v.visibility || 'PUBLIC';
                document.getElementById('input_title').value = originalTitle;
                document.getElementById('input_description').value = originalDesc;
                document.getElementById('input_visibility').value = originalVisibility;
                document.getElementById('btn_save').disabled = false;

                document.title = (v.title || '编辑视频') + ' - Video';
            }).catch(function (err) {
                VideoApp.toast('加载视频信息失败', 'error');
            });
        }

        if (videoId) loadVideoDetail();

        // 保存
        document.getElementById('btn_save').addEventListener('click', function () {
            var title = document.getElementById('input_title').value.trim();
            var desc = document.getElementById('input_description').value;
            var visibility = document.getElementById('input_visibility').value;

            if (!title) {
                VideoApp.toast('标题不能为空', 'error');
                return;
            }

            if (title === originalTitle && desc === originalDesc && visibility === originalVisibility) {
                VideoApp.toast('没有修改', 'info');
                return;
            }

            var btn = document.getElementById('btn_save');
            btn.disabled = true;

            axios.post('/video/updateInfo', {
                id: videoId,
                title: title,
                description: desc,
                visibility: visibility
            }, {
                headers: VideoApp.authHeaders()
            }).then(function () {
                VideoApp.toast('保存成功', 'success');
                originalTitle = title;
                originalDesc = desc;
                originalVisibility = visibility;
                btn.disabled = false;
            }).catch(function (err) {
                VideoApp.toast('保存失败: ' + (err.response ? err.response.data.message : err.message), 'error');
                btn.disabled = false;
            });
        });

        // 复制按钮
        function copyText(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(function () {
                    VideoApp.toast('已复制', 'success');
                });
            } else {
                var ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                VideoApp.toast('已复制', 'success');
            }
        }

        document.getElementById('copyWatchUrl').addEventListener('click', function () {
            var url = document.getElementById('infoWatchUrl').textContent;
            if (url && url !== '-') copyText(url);
        });

        document.getElementById('copyShortUrl').addEventListener('click', function () {
            var url = document.getElementById('infoShortUrl').textContent;
            if (url && url !== '-') copyText(url);
        });

        // 删除视频
        document.getElementById('btn_delete').addEventListener('click', function () {
            if (!confirm('确定要删除这个视频吗？此操作不可恢复，视频文件和所有相关数据将被永久删除。')) {
                return;
            }
            var btn = document.getElementById('btn_delete');
            btn.disabled = true;
            btn.textContent = '删除中...';

            axios.get('/video/delete?videoId=' + videoId, {
                headers: VideoApp.authHeaders()
            }).then(function () {
                VideoApp.toast('视频已删除', 'success');
                setTimeout(function () { window.location.href = '/'; }, 1500);
            }).catch(function (err) {
                VideoApp.toast('删除失败: ' + (err.response ? err.response.data.message : err.message), 'error');
                btn.disabled = false;
                btn.textContent = '删除视频';
            });
        });
    </script>
</body>
</html>
