<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="htmlTitle">播放页</title>

    <link rel="stylesheet" href="/css/global.css">

    <!-- Video.js -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <!-- 分辨率切换插件 -->
    <script src="https://unpkg.com/videojs-contrib-quality-levels/dist/videojs-contrib-quality-levels.min.js"></script>
    <script src="https://unpkg.com/videojs-http-source-selector/dist/videojs-http-source-selector.min.js"></script>

    <!-- axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios@0.26.1/dist/axios.min.js"></script>
</head>

<body>
    <header class="page-header">
        <a href="/" class="logo">📹 Video</a>
        <nav class="nav-menu" id="navMenu">
            <a href="/" class="nav-link">我的视频</a>
            <a href="/upload.html" class="nav-link">上传</a>
            <a href="/statistics.html" class="nav-link">统计</a>
            <a href="/transfer-youtube.html" class="nav-link">YouTube</a>
        </nav>
        <div class="header-right">
            <button id="theme-toggle" class="btn-icon" type="button" title="切换主题">🌙</button>
            <div class="header-auth" id="headerAuth"></div>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="菜单">☰</button>
    </header>

    <div class="watch-layout">
        <!-- Main content -->
        <div class="watch-main">
            <!-- Player with 16:9 aspect ratio wrapper -->
            <div class="player-wrapper">
                <video id="player-con" class="video-js vjs-big-play-centered vjs-fluid"></video>
            </div>

            <!-- Error/status message (shown when video not ready) -->
            <div id="errorInfo" class="not-ready-state" style="display:none;"></div>

            <!-- Video info -->
            <div class="video-info-section">
                <div id="div_title" class="video-title"></div>
                <div class="video-meta">
                    <span id="watchCount"></span>
                    <span id="createTime"></span>
                </div>
                <!-- 点赞/点踩 -->
                <div id="likeSection" style="margin:12px 0;display:flex;gap:12px;align-items:center;">
                    <button id="btn_like" class="btn btn-secondary" style="display:inline-flex;align-items:center;gap:4px;">
                        👍 <span id="likeCount">0</span>
                    </button>
                    <button id="btn_dislike" class="btn btn-secondary" style="display:inline-flex;align-items:center;gap:4px;">
                        👎
                    </button>
                </div>
                <div id="description" class="video-description"></div>
                <button id="btn_copyCurrentTime" type="button" class="btn btn-secondary" style="margin-top:12px;">复制当前时间</button>
            </div>

            <!-- 评论区 -->
            <div class="comment-section" style="margin-top:24px;padding:0 4px;">
                <h3 id="commentHeader" style="font-size:1.1rem;margin-bottom:16px;">评论 <span id="commentCount">0</span></h3>

                <!-- 排序按钮 -->
                <div style="margin-bottom:12px;display:flex;gap:8px;">
                    <button id="sortTime" class="btn btn-secondary btn-sm" style="font-weight:bold;">最新</button>
                    <button id="sortHot" class="btn btn-secondary btn-sm">最热</button>
                </div>

                <!-- 评论输入框 -->
                <div id="commentInputBox" style="margin-bottom:20px;">
                    <textarea id="commentInput" placeholder="添加评论..." rows="2"
                        style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;font-size:0.9rem;background:var(--bg-secondary);color:var(--text-primary);"></textarea>
                    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px;">
                        <button id="cancelComment" class="btn btn-secondary btn-sm">取消</button>
                        <button id="submitComment" class="btn btn-primary btn-sm">评论</button>
                    </div>
                </div>

                <!-- 评论列表 -->
                <div id="commentList"></div>
                <button id="loadMoreComments" class="btn btn-secondary btn-sm" style="display:none;width:100%;margin-top:12px;">加载更多</button>
            </div>
        </div>

        <!-- Sidebar playlist -->
        <div class="watch-sidebar">
            <div class="video-list"></div>
        </div>
    </div>

    <footer class="page-footer">
        <span>Video Platform</span>
    </footer>

    <script src="/js/global.js"></script>
    <script>
        // ==================== 全局变量 ====================
        let videoId;
        let watchId;
        let coverUrl;
        let videoStatus;
        let player;
        let playbackSessionId = null;
        let playStartTime = null;
        let totalPlayDurationMs = 0;
        let lastHeartbeatTime = null;
        let currentResolution = 'auto';

        // ==================== URL 工具 ====================
        function getUrlVariable(key) {
            return VideoApp.getUrlVariable(key);
        }

        function isPC() {
            return VideoApp.isPC();
        }

        // ==================== Video.js 初始化 ====================
        function initPlayer(m3u8Url, seekTimeSeconds) {
            player = videojs('player-con', {
                controls: true,
                autoplay: true,
                preload: 'auto',
                fluid: true,
                playsinline: true,
                html5: {
                    vhs: {
                        overrideNative: true
                    },
                    nativeAudioTracks: false,
                    nativeVideoTracks: false
                }
            });

            // 分辨率切换插件
            player.httpSourceSelector();

            // 设置视频源
            player.src({ type: 'application/x-mpegURL', src: m3u8Url });

            // 跳转到指定时间
            player.on('loadedmetadata', function () {
                if (seekTimeSeconds > 0) {
                    player.currentTime(seekTimeSeconds);
                }
            });

            // 监听分辨率变化
            let qualityLevels = player.qualityLevels();
            qualityLevels.on('change', function () {
                let activeLevel = qualityLevels[qualityLevels.selectedIndex];
                if (activeLevel) {
                    currentResolution = activeLevel.height + 'p';
                }
            });

            // 键盘快捷键
            initKeyboardShortcuts();

            // 播放器事件监听
            addPlayerEventListeners();

            // 心跳定时器（15 秒）
            setInterval(function () { sendHeartbeat('TIMER', null); }, 15000);

            // 退出上报
            initExitReporting();

            // 进度定时保存到 localStorage
            setInterval(saveProgressToLocal, 5000);
        }

        // ==================== 键盘快捷键 ====================
        function initKeyboardShortcuts() {
            document.addEventListener('keydown', function (e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (!player) return;

                switch (e.key) {
                    case ' ':
                    case 'k':
                    case 'K':
                        e.preventDefault();
                        player.paused() ? player.play() : player.pause();
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        player.currentTime(Math.max(0, player.currentTime() - 5));
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        player.currentTime(Math.min(player.duration(), player.currentTime() + 5));
                        break;
                    case 'j':
                    case 'J':
                        e.preventDefault();
                        player.currentTime(Math.max(0, player.currentTime() - 10));
                        break;
                    case 'l':
                    case 'L':
                        e.preventDefault();
                        player.currentTime(Math.min(player.duration(), player.currentTime() + 10));
                        break;
                    case 'f':
                    case 'F':
                        e.preventDefault();
                        player.isFullscreen() ? player.exitFullscreen() : player.requestFullscreen();
                        break;
                    case 'm':
                    case 'M':
                        e.preventDefault();
                        player.muted(!player.muted());
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        player.volume(Math.min(1, player.volume() + 0.1));
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        player.volume(Math.max(0, player.volume() - 0.1));
                        break;
                }
            });
        }

        // ==================== 时间跳转 t= ====================
        function getInitSeekTimeInSeconds(watchInfo) {
            // 优先级：URL t= > 后端 progress > localStorage > 0
            let tParam = getUrlVariable('t');
            if (tParam) {
                return parseFloat(tParam);
            }

            if (watchInfo.progressInMillis && watchInfo.progressInMillis > 0) {
                return watchInfo.progressInMillis / 1000;
            }

            let localProgress = localStorage.getItem('video_progress_' + watchInfo.videoId);
            if (localProgress) {
                return parseFloat(localProgress);
            }

            return 0;
        }

        // ==================== localStorage 进度缓存 ====================
        function saveProgressToLocal() {
            if (player && videoId && !player.paused()) {
                localStorage.setItem('video_progress_' + videoId, player.currentTime().toFixed(1));
            }
        }

        // ==================== 复制当前时间按钮 ====================
        function addCopyCurrentTimeButtonClickListener() {
            document.getElementById('btn_copyCurrentTime').addEventListener('click', function () {
                let currentTime = Math.round(player.currentTime());
                let baseUrl = window.location.origin + window.location.pathname;
                let params = new URLSearchParams();
                params.set('v', watchId);
                let listParam = getUrlVariable('list');
                if (listParam) params.set('list', listParam);
                params.set('t', currentTime);
                let url = baseUrl + '?' + params.toString();
                navigator.clipboard.writeText(url);
                VideoApp.toast('已复制播放链接（' + currentTime + '秒）', 'success');
            });
        }

        // ==================== 播放器事件 ====================
        function addPlayerEventListeners() {
            let events = ['play', 'pause', 'ended', 'waiting', 'error',
                'seeking', 'seeked', 'fullscreenchange', 'volumechange'];
            events.forEach(function (eventName) {
                player.on(eventName, function () {
                    sendHeartbeat('EVENT', eventName);
                });
            });

            // 播放时间追踪
            player.on('play', function () {
                playStartTime = Date.now();
            });
            player.on('pause', function () {
                if (playStartTime) {
                    totalPlayDurationMs += (Date.now() - playStartTime);
                    playStartTime = null;
                }
                saveProgressToLocal();
            });
        }

        // ==================== 心跳上报 ====================
        function sendHeartbeat(type, playerEvent) {
            if (!player) return;
            let currentTimeMs = Math.round(player.currentTime() * 1000);

            // 发送到现有心跳接口（保持兼容）
            axios.post('/heartbeat/add', {
                videoId: videoId,
                clientId: localStorage.clientId,
                sessionId: sessionStorage.sessionId,
                videoStatus: videoStatus,
                playerProvider: 'VIDEOJS_WEB',
                clientTime: new Date(),
                type: type,
                event: playerEvent,
                playerTime: currentTimeMs,
                playerStatus: player.paused() ? 'paused' : 'playing',
                playerVolume: player.volume()
            }, {
                headers: { 'token': localStorage.token }
            }).catch(function () { /* 静默失败 */ });

            // 发送到 PlaybackSession 心跳接口
            if (playbackSessionId) {
                axios.post('/playback/heartbeat', {
                    playbackSessionId: playbackSessionId,
                    currentTimeMs: currentTimeMs,
                    isPlaying: !player.paused(),
                    resolution: currentResolution,
                    totalPlayDurationMs: getTotalPlayDuration()
                }, {
                    headers: { 'token': localStorage.token }
                }).catch(function () { /* 静默失败 */ });
            }
        }

        function getTotalPlayDuration() {
            let total = totalPlayDurationMs;
            if (playStartTime) {
                total += (Date.now() - playStartTime);
            }
            return total;
        }

        // ==================== PlaybackSession 生命周期 ====================
        function startPlaybackSession() {
            axios.post('/playback/start', {
                watchId: watchId,
                videoId: videoId,
                clientId: localStorage.clientId,
                sessionId: sessionStorage.sessionId
            }, {
                headers: { 'token': localStorage.token }
            }).then(function (res) {
                if (res.data && res.data.data) {
                    playbackSessionId = res.data.data.playbackSessionId;
                }
            }).catch(function () { /* 静默失败 */ });
        }

        // ==================== 退出上报 ====================
        function initExitReporting() {
            document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'hidden' && playbackSessionId && player) {
                    let currentTimeMs = Math.round(player.currentTime() * 1000);
                    if (videoId) {
                        localStorage.setItem('video_progress_' + videoId, (currentTimeMs / 1000).toFixed(1));
                    }
                    navigator.sendBeacon('/playback/exit', JSON.stringify({
                        playbackSessionId: playbackSessionId,
                        currentTimeMs: currentTimeMs,
                        totalPlayDurationMs: getTotalPlayDuration(),
                        exitType: 'CLOSE_TAB',
                        resolution: currentResolution
                    }));
                }
            });
        }

        // ==================== 视频加载 ====================
        function loadVideo() {
            watchId = getUrlVariable('v');
            axios.get('/watchController/getWatchInfo?watchId=' + watchId
                + '&clientId=' + localStorage.clientId + '&sessionId=' + sessionStorage.sessionId
                + '&token=' + localStorage.token)
                .then(function (res) {
                    startPlayVideo(res.data.data);
                    loadVideoInfo(videoId);
                    loadPlaylist(videoId);
                    addWatchHistory();
                    addCopyCurrentTimeButtonClickListener();
                    startPlaybackSession();
                })
                .catch(function () {
                    VideoApp.toast('加载视频失败', 'error');
                });
        }

        function startPlayVideo(data) {
            videoId = data.videoId;
            coverUrl = data.coverUrl;
            videoStatus = data.videoStatus;

            if (videoStatus !== 'READY') {
                document.getElementById('errorInfo').innerHTML
                    = '视频正在上传或转码<br><br>请稍后再来<br><br>'
                    + 'videoId=' + videoId + '<br><br>当前状态：' + data.videoStatus;
                document.getElementById('errorInfo').style.display = 'block';
                document.querySelector('.player-wrapper').style.display = 'none';
                return;
            }

            let seekTime = getInitSeekTimeInSeconds(data);
            initPlayer(data.multivariantPlaylistUrl, seekTime);
        }

        // ==================== 视频信息 ====================
        function loadVideoInfo(videoId) {
            axios.get('/video/getVideoDetail?videoId=' + videoId)
                .then(function (res) {
                    let data = res.data.data;
                    document.getElementById('div_title').innerText = data.title;
                    document.getElementById('description').innerText = data.description;
                    document.getElementById('htmlTitle').innerText = data.title || '播放页';

                    let createTime = document.getElementById('createTime');
                    if (data.type === 'USER_UPLOAD') {
                        createTime.innerText = '发布时间：' + data.createTimeString;
                    } else if (data.type === 'YOUTUBE') {
                        createTime.innerText = '发布时间：' + data.youtubePublishTimeString;
                    }

                    if (data.watchCount !== undefined) {
                        document.getElementById('watchCount').innerText = data.watchCount + ' 次播放';
                    }
                    // 加载点赞状态
                    loadLikeStatus(videoId);
                    // 加载评论
                    loadCommentCount();
                    loadComments(false);
                });
        }

        // ==================== 点赞/点踩 ====================
        function loadLikeStatus(videoId) {
            axios.get('/videoLike/getStatus?videoId=' + videoId)
                .then(function (res) {
                    var d = res.data.data;
                    document.getElementById('likeCount').textContent = d.likeCount || 0;
                    var btnLike = document.getElementById('btn_like');
                    var btnDislike = document.getElementById('btn_dislike');
                    btnLike.style.fontWeight = d.userAction === 'LIKE' ? 'bold' : 'normal';
                    btnLike.style.opacity = d.userAction === 'LIKE' ? '1' : '0.7';
                    btnDislike.style.fontWeight = d.userAction === 'DISLIKE' ? 'bold' : 'normal';
                    btnDislike.style.opacity = d.userAction === 'DISLIKE' ? '1' : '0.7';
                });
        }

        document.getElementById('btn_like').addEventListener('click', function () {
            if (!videoId) return;
            axios.get('/videoLike/like?videoId=' + videoId, {headers: VideoApp.authHeaders()})
                .then(function () { loadLikeStatus(videoId); })
                .catch(function () { VideoApp.toast('请先登录', 'error'); });
        });

        document.getElementById('btn_dislike').addEventListener('click', function () {
            if (!videoId) return;
            axios.get('/videoLike/dislike?videoId=' + videoId, {headers: VideoApp.authHeaders()})
                .then(function () { loadLikeStatus(videoId); })
                .catch(function () { VideoApp.toast('请先登录', 'error'); });
        });

        // ==================== 评论系统 ====================
        let commentSort = 'time';
        let commentSkip = 0;
        const COMMENT_LIMIT = 20;

        function maskPhone(phone) {
            if (!phone || phone.length < 7) return '用户';
            return phone.substring(0, 3) + '****' + phone.substring(phone.length - 4);
        }

        function timeAgo(dateStr) {
            let d = new Date(dateStr);
            let now = Date.now();
            let diff = (now - d.getTime()) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 2592000) return Math.floor(diff / 86400) + '天前';
            return d.toLocaleDateString('zh-CN');
        }

        function loadCommentCount() {
            if (!videoId) return;
            axios.get('/comment/getCount?videoId=' + videoId).then(function (res) {
                document.getElementById('commentCount').textContent = res.data.data.count || 0;
            });
        }

        function loadComments(append) {
            if (!videoId) return;
            if (!append) {
                commentSkip = 0;
                document.getElementById('commentList').innerHTML = '';
            }
            axios.get('/comment/getByVideoId?videoId=' + videoId
                + '&skip=' + commentSkip + '&limit=' + COMMENT_LIMIT + '&sort=' + commentSort)
                .then(function (res) {
                    var comments = res.data.data;
                    var container = document.getElementById('commentList');
                    comments.forEach(function (c) {
                        container.appendChild(buildCommentEl(c, false));
                    });
                    commentSkip += comments.length;
                    document.getElementById('loadMoreComments').style.display =
                        comments.length >= COMMENT_LIMIT ? 'block' : 'none';
                });
        }

        function buildCommentEl(c, isReply) {
            var div = document.createElement('div');
            div.style.cssText = 'margin-bottom:16px;padding:' + (isReply ? '8px 0 0 32px' : '0') + ';';
            div.dataset.commentId = c.id;

            var header = document.createElement('div');
            header.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:4px;';
            var nameSpan = document.createElement('span');
            nameSpan.style.cssText = 'font-weight:600;font-size:0.85rem;';
            nameSpan.textContent = maskPhone(c.userPhone);
            var timeSpan = document.createElement('span');
            timeSpan.style.cssText = 'font-size:0.8rem;color:var(--text-secondary);';
            timeSpan.textContent = timeAgo(c.createTime);
            header.appendChild(nameSpan);
            header.appendChild(timeSpan);

            var contentDiv = document.createElement('div');
            contentDiv.style.cssText = 'font-size:0.9rem;margin-bottom:6px;line-height:1.5;';
            if (isReply && c.replyToUserPhone) {
                var replyTag = document.createElement('span');
                replyTag.style.cssText = 'color:var(--primary-color);font-size:0.85rem;';
                replyTag.textContent = '@' + maskPhone(c.replyToUserPhone) + ' ';
                contentDiv.appendChild(replyTag);
            }
            contentDiv.appendChild(document.createTextNode(c.content));

            var actions = document.createElement('div');
            actions.style.cssText = 'display:flex;align-items:center;gap:12px;font-size:0.8rem;color:var(--text-secondary);';

            var likeBtn = document.createElement('button');
            likeBtn.className = 'btn-icon';
            likeBtn.style.cssText = 'font-size:0.8rem;cursor:pointer;background:none;border:none;color:var(--text-secondary);';
            likeBtn.textContent = '👍 ' + (c.likeCount || 0);
            likeBtn.addEventListener('click', function () {
                axios.get('/comment/like?commentId=' + c.id, {headers: VideoApp.authHeaders()})
                    .then(function () { loadComments(false); loadCommentCount(); })
                    .catch(function () { VideoApp.toast('请先登录', 'error'); });
            });
            actions.appendChild(likeBtn);

            var replyBtn = document.createElement('button');
            replyBtn.className = 'btn-icon';
            replyBtn.style.cssText = 'font-size:0.8rem;cursor:pointer;background:none;border:none;color:var(--text-secondary);';
            replyBtn.textContent = '回复';
            replyBtn.addEventListener('click', function () {
                showReplyInput(div, c.id);
            });
            actions.appendChild(replyBtn);

            // 删除按钮（评论者或视频作者）
            var deleteBtn = document.createElement('button');
            deleteBtn.className = 'btn-icon';
            deleteBtn.style.cssText = 'font-size:0.8rem;cursor:pointer;background:none;border:none;color:var(--text-secondary);';
            deleteBtn.textContent = '删除';
            deleteBtn.addEventListener('click', function () {
                if (!confirm('确定删除此评论？')) return;
                axios.get('/comment/delete?commentId=' + c.id, {headers: VideoApp.authHeaders()})
                    .then(function () { loadComments(false); loadCommentCount(); })
                    .catch(function () { VideoApp.toast('删除失败', 'error'); });
            });
            actions.appendChild(deleteBtn);

            div.appendChild(header);
            div.appendChild(contentDiv);
            div.appendChild(actions);

            // 回复区域
            if (!isReply && c.replyCount > 0) {
                var replyToggle = document.createElement('button');
                replyToggle.className = 'btn-icon';
                replyToggle.style.cssText = 'font-size:0.8rem;cursor:pointer;background:none;border:none;color:var(--primary-color);margin-top:4px;';
                replyToggle.textContent = '▶ ' + c.replyCount + ' 条回复';
                var replyContainer = document.createElement('div');
                replyContainer.style.display = 'none';
                replyToggle.addEventListener('click', function () {
                    if (replyContainer.style.display === 'none') {
                        replyContainer.style.display = 'block';
                        replyToggle.textContent = '▼ 收起回复';
                        loadReplies(c.id, replyContainer);
                    } else {
                        replyContainer.style.display = 'none';
                        replyToggle.textContent = '▶ ' + c.replyCount + ' 条回复';
                    }
                });
                div.appendChild(replyToggle);
                div.appendChild(replyContainer);
            }

            return div;
        }

        function loadReplies(parentId, container) {
            container.innerHTML = '';
            axios.get('/comment/getReplies?parentId=' + parentId + '&skip=0&limit=50')
                .then(function (res) {
                    res.data.data.forEach(function (r) {
                        container.appendChild(buildCommentEl(r, true));
                    });
                });
        }

        function showReplyInput(parentDiv, parentId) {
            var existingInput = parentDiv.querySelector('.reply-input-box');
            if (existingInput) { existingInput.remove(); return; }

            var box = document.createElement('div');
            box.className = 'reply-input-box';
            box.style.cssText = 'margin:8px 0 0 32px;';

            var textarea = document.createElement('textarea');
            textarea.placeholder = '回复...';
            textarea.rows = 1;
            textarea.style.cssText = 'width:100%;padding:6px 10px;border:1px solid var(--border-color);border-radius:6px;resize:none;font-size:0.85rem;background:var(--bg-secondary);color:var(--text-primary);';

            var btnRow = document.createElement('div');
            btnRow.style.cssText = 'display:flex;justify-content:flex-end;gap:6px;margin-top:6px;';

            var cancelBtn = document.createElement('button');
            cancelBtn.className = 'btn btn-secondary btn-sm';
            cancelBtn.textContent = '取消';
            cancelBtn.style.fontSize = '0.8rem';
            cancelBtn.addEventListener('click', function () { box.remove(); });

            var submitBtn = document.createElement('button');
            submitBtn.className = 'btn btn-primary btn-sm';
            submitBtn.textContent = '回复';
            submitBtn.style.fontSize = '0.8rem';
            submitBtn.addEventListener('click', function () {
                var text = textarea.value.trim();
                if (!text) return;
                axios.post('/comment/add', {videoId: videoId, content: text, parentId: parentId},
                    {headers: VideoApp.authHeaders()})
                    .then(function () { box.remove(); loadComments(false); loadCommentCount(); })
                    .catch(function () { VideoApp.toast('请先登录', 'error'); });
            });

            btnRow.appendChild(cancelBtn);
            btnRow.appendChild(submitBtn);
            box.appendChild(textarea);
            box.appendChild(btnRow);
            parentDiv.appendChild(box);
            textarea.focus();
        }

        // 排序按钮
        document.getElementById('sortTime').addEventListener('click', function () {
            commentSort = 'time';
            this.style.fontWeight = 'bold';
            document.getElementById('sortHot').style.fontWeight = 'normal';
            loadComments(false);
        });
        document.getElementById('sortHot').addEventListener('click', function () {
            commentSort = 'hot';
            this.style.fontWeight = 'bold';
            document.getElementById('sortTime').style.fontWeight = 'normal';
            loadComments(false);
        });

        // 提交评论
        document.getElementById('submitComment').addEventListener('click', function () {
            var content = document.getElementById('commentInput').value.trim();
            if (!content) return;
            axios.post('/comment/add', {videoId: videoId, content: content},
                {headers: VideoApp.authHeaders()})
                .then(function () {
                    document.getElementById('commentInput').value = '';
                    loadComments(false);
                    loadCommentCount();
                })
                .catch(function () { VideoApp.toast('请先登录', 'error'); });
        });

        document.getElementById('cancelComment').addEventListener('click', function () {
            document.getElementById('commentInput').value = '';
        });

        document.getElementById('loadMoreComments').addEventListener('click', function () {
            loadComments(true);
        });

        // ==================== 播放列表 ====================
        function loadPlaylist(videoId) {
            let playlistId = getUrlVariable('list');
            if (!playlistId) return;

            axios.get('playlist/getPlayItemListDetail?playlistId=' + playlistId)
                .then(function (response) {
                    let itemList = response.data.data;
                    let videoList = document.querySelector('.video-list');

                    for (let i = 0; i < itemList.length; i++) {
                        let dataItem = itemList[i];
                        let videoItem = document.createElement('div');
                        videoItem.classList.add('video-item');

                        let coverImage = document.createElement('img');
                        coverImage.classList.add('video-thumbnail');
                        coverImage.src = dataItem.coverUrl;

                        let videoInfo = document.createElement('div');
                        videoInfo.style.minWidth = '0';

                        let videoTitle = document.createElement('div');
                        videoTitle.classList.add('video-title');
                        videoTitle.innerText = dataItem.title;

                        let videoMeta = document.createElement('p');
                        videoMeta.classList.add('video-meta');
                        videoMeta.textContent = dataItem.watchCount + ' 播放 · ' + dataItem.videoCreateTime;

                        if (dataItem.videoId === videoId) {
                            videoItem.classList.add('active');
                        }
                        videoItem.addEventListener('click', function () {
                            window.location.href = 'watch?v=' + dataItem.watchId + '&list=' + playlistId;
                        });

                        videoInfo.appendChild(videoTitle);
                        videoInfo.appendChild(videoMeta);
                        videoItem.appendChild(coverImage);
                        videoItem.appendChild(videoInfo);
                        videoList.appendChild(videoItem);
                    }
                })
                .catch(function (error) {
                    console.log(error);
                });
        }

        // ==================== ID 管理 ====================
        let isIdsHandled = false;

        function start() {
            handleClientId();
            handleSessionId();
        }

        function handleClientId() {
            if (localStorage.getItem('clientId') != null) {
                onHandleIdsFinished();
                return;
            }
            axios.get('//' + document.domain + ':' + location.port + '/client/requestClientId')
                .then(function (res) {
                    localStorage.clientId = res.data.data.clientId;
                    onHandleIdsFinished();
                });
        }

        function handleSessionId() {
            if (sessionStorage.getItem('sessionId') != null) {
                onHandleIdsFinished();
                return;
            }
            axios.get('//' + document.domain + ':' + location.port + '/session/requestSessionId')
                .then(function (res) {
                    sessionStorage.sessionId = res.data.data.sessionId;
                    onHandleIdsFinished();
                });
        }

        function onHandleIdsFinished() {
            if (isIdsHandled || localStorage.getItem('clientId') == null
                || sessionStorage.getItem('sessionId') == null) {
                return;
            }
            isIdsHandled = true;
            loadVideo();
        }

        function addWatchHistory() {
            axios.get('/watchController/addWatchLog?videoId=' + videoId
                + '&clientId=' + localStorage.clientId
                + '&sessionId=' + sessionStorage.sessionId
                + '&videoStatus=' + videoStatus)
                .then(function () {});
        }

        // ==================== 启动 ====================
        start();
    </script>
</body>
</html>
