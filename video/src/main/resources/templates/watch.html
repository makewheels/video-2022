<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="htmlTitle">播放页</title>

    <link rel="stylesheet" href="/css/global.css">

    <!-- Aliplayer -->
    <link rel="stylesheet" href="https://g.alicdn.com/de/prismplayer/2.13.2/skins/default/aliplayer-min.css"/>
    <script src="https://g.alicdn.com/de/prismplayer/2.13.2/aliplayer-min.js"></script>

    <!-- axios -->
    <script src="https://production-bucket.oss-cn-beijing.aliyuncs.com/dist/axios/axios-0.26.1.min.js"></script>
</head>

<body>
    <header class="page-header">
        <a href="/" class="logo">Video</a>
        <button id="theme-toggle" type="button">🌙</button>
    </header>

    <div class="watch-layout">
        <!-- Main content -->
        <div class="watch-main">
            <!-- Player with 16:9 aspect ratio wrapper -->
            <div class="player-wrapper">
                <div class="prism-player" id="player-con"></div>
            </div>

            <!-- Error/status message (shown when video not ready) -->
            <div id="errorInfo" class="status-message" style="display:none;"></div>

            <!-- Video info -->
            <div class="video-info-section">
                <div id="div_title" class="video-title"></div>
                <div class="video-meta">
                    <span id="watchCount"></span>
                    <span id="createTime"></span>
                </div>
                <div id="description" class="video-description"></div>
                <button id="btn_copyCurrentTime" type="button" class="btn btn-secondary" style="margin-top:12px;">复制当前时间</button>
            </div>
        </div>

        <!-- Sidebar playlist -->
        <div class="watch-sidebar">
            <div class="video-list"></div>
        </div>
    </div>

    <script src="/js/global.js"></script>
    <script>
        // === ALL ORIGINAL JS LOGIC PRESERVED EXACTLY ===
        // Only changes: use VideoApp.getUrlVariable/isPC where available

        let videoId;
        let watchId;
        let coverUrl;

        let videoStatus;
        let currentUrl;
        let player;

        let playerElement = document.getElementById("player-con");

        function getUrlVariable(key) {
            return VideoApp.getUrlVariable(key);
        }

        function isPC() {
            return VideoApp.isPC();
        }

        function playByM3u8UrlAndTime(m3u8Url, time) {
            currentUrl = m3u8Url;
            player = new Aliplayer({
                    "id": "player-con",
                    "source": currentUrl,
                    "width": "100%",
                    "height": "100%",
                    "autoplay": true,
                    "isLive": false,
                    "rePlay": false,
                    "playsinline": true,
                    "isVBR": true,
                    "preload": true,
                    "controlBarVisibility": "hover",
                    "useH5Prism": true
                }, function (player) {
                    player.seek(time);
                    player.tag.style.objectFit = 'contain'
                }
            );
        }

        function addCopyCurrentTimeButtonClickListener() {
            document.getElementById("btn_copyCurrentTime").addEventListener("click", function () {
                let currentTime = player.getCurrentTime() * 1000;
                currentTime = Math.round(currentTime);
                let url = window.location.href + "&seekTimeInMills=" + currentTime;
                navigator.clipboard.writeText(url);
                VideoApp.toast("已复制当前时间：" + currentTime, "success");
            });
        }

        function loadVideo() {
            watchId = getUrlVariable("v");
            axios.get('/watchController/getWatchInfo?watchId=' + watchId
                + '&clientId=' + localStorage.clientId + '&sessionId=' + sessionStorage.sessionId
                + '&token=' + localStorage.token)
                .then(function (res) {
                    startPlayVideo(res.data.data);
                    loadVideoInfo(videoId);
                    loadPlaylist(videoId);
                    addWatchHistory();
                    addPlayerEventListeners();
                    setInterval("sendHeartbeat('TIMER', null)", 2000);
                    addCopyCurrentTimeButtonClickListener();
                })
                .catch(function (err) {
                    VideoApp.toast('加载视频失败', 'error');
                })
        }

        function getInitSeekTimeInSeconds(watchInfo){
            let seekTimeInMills;
            seekTimeInMills = getUrlVariable("seekTimeInMills");
            if (!seekTimeInMills) {
                seekTimeInMills = watchInfo.progressInMillis;
            }
            if (!seekTimeInMills) {
                seekTimeInMills = 0;
            }
            return seekTimeInMills / 1000;
        }

        function startPlayVideo(data) {
            videoId = data.videoId;
            coverUrl = data.coverUrl;

            videoStatus = data.videoStatus;
            if (videoStatus !== "READY") {
                document.getElementById("errorInfo").innerHTML
                    = "视频正在上传或转码<br><br>" + "请稍后再来<br><br>"
                    + "videoId=" + videoId + "<br><br>" + "当前状态：" + data.videoStatus;
                document.getElementById("errorInfo").style.display = "block";
                document.querySelector(".player-wrapper").style.display = "none";
                return;
            }

            // Player fills the wrapper (100% width and height via CSS)
            // No explicit width/height needed — .player-wrapper handles 16:9

            playByM3u8UrlAndTime(data.multivariantPlaylistUrl, getInitSeekTimeInSeconds(data));
        }

        function loadVideoInfo(videoId) {
            axios.get('/video/getVideoDetail?videoId=' + videoId)
                .then(function (res) {
                    let data = res.data.data;
                    document.getElementById("div_title").innerText = data.title;
                    document.getElementById("description").innerText = data.description;

                    let createTime = document.getElementById("createTime");
                    if (data.type === "USER_UPLOAD") {
                        createTime.innerText = "发布时间：" + data.createTimeString;
                    } else if (data.type === "YOUTUBE") {
                        createTime.innerText = "发布时间：" + data.youtubePublishTimeString;
                    }
                });
        }

        function loadPlaylist(videoId) {
            const playlistId = getUrlVariable('list');
            if (!playlistId) {
                return;
            }
            axios.get("playlist/getPlayItemListDetail?playlistId=" + playlistId)
                .then(function (response) {
                    const itemList = response.data.data;
                    const videoList = document.querySelector('.video-list');

                    for (let i = 0; i < itemList.length; i++) {
                        const dataItem = itemList[i];

                        const videoItem = document.createElement('div');
                        videoItem.classList.add('video-item');

                        const coverImage = document.createElement('img');
                        coverImage.classList.add('video-thumbnail');
                        coverImage.src = dataItem.coverUrl;

                        const videoInfo = document.createElement('div');
                        videoInfo.style.minWidth = '0';

                        const videoTitle = document.createElement('div');
                        videoTitle.classList.add('video-title');
                        videoTitle.innerText = dataItem.title;

                        const videoMeta = document.createElement('p');
                        videoMeta.classList.add('video-meta');
                        videoMeta.textContent = dataItem.watchCount + ' 播放 · ' + dataItem.videoCreateTime;

                        if (dataItem.videoId === videoId) {
                            videoItem.classList.add('active');
                        }
                        videoItem.addEventListener('click', function () {
                            window.location.href = 'watch?v=' + dataItem.watchId + '&list=' + playlistId;
                        });

                        videoInfo.appendChild(videoTitle);
                        videoInfo.appendChild(videoMeta);

                        videoItem.appendChild(coverImage);
                        videoItem.appendChild(videoInfo);

                        videoList.appendChild(videoItem);
                    }
                })
                .catch(function (error) {
                    console.log(error);
                });
        }

        function start() {
            handleClientId();
            handleSessionId();
        }

        function handleClientId() {
            if (localStorage.getItem("clientId") != null) {
                onHandleIdsFinished();
                return;
            }
            axios.get('//' + document.domain + ':' + location.port + '/client/requestClientId')
                .then(function (res) {
                    localStorage.clientId = res.data.data.clientId;
                    onHandleIdsFinished();
                });
        }

        function handleSessionId() {
            if (sessionStorage.getItem("sessionId") != null) {
                onHandleIdsFinished();
                return;
            }
            axios.get('//' + document.domain + ':' + location.port + '/session/requestSessionId')
                .then(function (res) {
                    sessionStorage.sessionId = res.data.data.sessionId;
                    onHandleIdsFinished();
                });
        }

        let isIdsHandled = false;

        function onHandleIdsFinished() {
            if (isIdsHandled || localStorage.getItem("clientId") == null
                || sessionStorage.getItem("sessionId") == null) {
                return;
            }
            isIdsHandled = true;
            loadVideo();
        }

        function addWatchHistory() {
            axios.get('/watchController/addWatchLog?videoId=' + videoId
                + '&clientId=' + localStorage.clientId
                + '&sessionId=' + sessionStorage.sessionId
                + '&videoStatus=' + videoStatus)
                .then(function (res) {
                });
        }

        function addPlayerEventListeners() {
            player.on("ready", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("play", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("pause", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("canplay", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("playing", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("ended", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("liveStreamStop", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("onM3u8Retry", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("hideBar", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("showBar", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("waiting", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("snapshoted", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("requestFullScreen", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("cancelFullScreen", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("error", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("startSeek", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("completeSeek", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("resolutionChange", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("seiFrame", function (res) { sendHeartbeat("EVENT", res.type) });
            player.on("rtsFallback", function (res) { sendHeartbeat("EVENT", res.type) });
        }

        function sendHeartbeat(type, playerEvent) {
            axios.post("/heartbeat/add", {
                videoId: videoId,
                clientId: localStorage.clientId,
                sessionId: sessionStorage.sessionId,
                videoStatus: videoStatus,
                playerProvider: "ALIYUN_WEB",
                clientTime: new Date(),
                type: type,
                event: playerEvent,
                playerTime: player.getCurrentTime() * 1000,
                playerStatus: player.getStatus(),
                playerVolume: player.getVolume()
            }, {
                headers: {"token": localStorage.token}
            }).then(function (res) {
            });
        }

        start();
    </script>
</body>
</html>
