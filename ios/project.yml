name: VideoApp
options:
  bundleIdPrefix: com.github.makewheels
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  VideoApp:
    type: application
    platform: iOS
    sources:
      - path: VideoApp/Sources
      - path: VideoApp/Resources
    settings:
      base:
        INFOPLIST_FILE: VideoApp/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.github.makewheels.video2022
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: ["-DDEBUG"]
        Release: {}
    dependencies: []
  VideoAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VideoAppTests
    dependencies:
      - target: VideoApp
    settings:
      base:
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
